    <script>
        tailwind.config = {

                extend: {
                    colors: {

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            transition: width 0.3s ease-in-out;
            overflow-y: auto;
            height: 100vh;
        }
        
        .sidebar.collapsed {
            width: 64px;
        }
        
        .sidebar.collapsed .sidebar-text {
            display: none;
        }
        
        .sidebar.collapsed .sidebar-icon {
            margin: 0 auto;
        }
        
        .sidebar-item {
            transition: all 0.2s ease-in-out;
            font-size: 0.875rem;
        }
        
        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 500;
        }
        
        .menu-header h2 {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #003eb3 0%, #0056c7 100%);
        }
        
        .drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        
        .drawer.open {
            transform: translateX(0);
        }
        
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 15;
            display: none;
        }
        
        .drawer-overlay.open {
            display: block;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #003eb3;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

    <script>
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 加载公共脚本
                const script = document.createElement('script');
                script.src = 'common/scripts.js';
                script.onload = function() {
                    // 脚本加载完成后初始化
                    if (typeof initCommonFunctions === 'function') {
                        initCommonFunctions();
                    }
                    // 初始化页面特定功能
                    initPageFunctions();
                };
                document.body.appendChild(script);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 页面加载完成后加载侧边栏
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadSidebar);
        } else {
            loadSidebar();
        }
        
        // 页面特定功能
        function initPageFunctions() {
            // 初始化Lucide图标
            lucide.createIcons();
            
            // 筛选条件选择器功能
            const filterSelect = document.getElementById('filter-select');
            const filterInput = document.getElementById('filter-input');

            filterSelect.addEventListener('change', function() {
                const selectedValue = this.value;
                
                // 根据选择的筛选条件更新占位符
                if (selectedValue === 'code') {
                    filterInput.placeholder = '按合同号搜索';
                } else if (selectedValue === 'name') {
                    filterInput.placeholder = '按客户搜索';
                } else if (selectedValue === 'company') {
                    filterInput.placeholder = '按财务主体搜索';
                } else if (selectedValue === 'type') {
                    filterInput.placeholder = '按项目类型搜索';
                }
                
                // 清空输入框
                filterInput.value = '';
            });

            // 高级筛选功能
            const advancedFilterBtn = document.getElementById('advanced-filter-btn');
            const advancedFilter = document.getElementById('advanced-filter');

            advancedFilterBtn.addEventListener('click', function() {
                advancedFilter.classList.toggle('hidden');
                
                // 切换按钮文本和图标
                if (!advancedFilter.classList.contains('hidden')) {
                    this.innerHTML = '收起筛选 <i data-lucide="chevron-up" class="w-4 h-4 ml-1"></i>';
                } else {
                    this.innerHTML = '高级筛选 <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>';
                }
                
                // 重新初始化图标
                lucide.createIcons();
            });
            

            
            // 项目抽屉功能
            const addBtn = document.getElementById('add-btn');
            const projectDrawer = document.getElementById('project-drawer');
            const closeProjectDrawer = document.getElementById('close-project-drawer');
            const cancelProjectBtn = document.getElementById('cancel-project-btn');
            const saveProjectBtn = document.getElementById('save-project-btn');
            const projectDrawerTitle = document.getElementById('project-drawer-title');
            
            addBtn.addEventListener('click', () => {
                projectDrawerTitle.textContent = '新增项目';
                // 重置表单
                
                // 启用所有表单字段（除了创建日期和修改日期）
                const formFields = projectDrawer.querySelectorAll('input, select, textarea');
                formFields.forEach(field => {
                    if (!field.id.includes('create-date') && !field.id.includes('modify-date')) {
                        field.disabled = false;
                    }
                });
                
                // 显示保存和关闭按钮
                document.getElementById('cancel-project-btn').style.display = 'block';
                document.getElementById('save-project-btn').style.display = 'block';
                
                openDrawer(projectDrawer);
            });
            
            // 将函数添加到window对象，使它们全局可见
            window.viewProject = function(code) {
                projectDrawerTitle.textContent = '项目详情';
                // 模拟数据填充
                if (code === 'PRO001') {
                    document.getElementById('project-company').value = '成都总公司';
                    document.getElementById('project-type').value = 'design';
                    document.getElementById('project-requirement').value = 'decoration';
                    document.getElementById('project-customer').value = '张三';
                    document.getElementById('project-customer-code').value = 'MER001';
                    document.getElementById('project-order').value = 'OD20260001';
                    document.getElementById('project-contract').value = 'HT20260001';
                    document.getElementById('project-contract-name').value = '家装设计合同';
                    document.getElementById('project-business').value = 'retail-shj-design';
                    document.getElementById('project-product-category').value = 'villa';
                    document.getElementById('project-product').value = '艺境名品5.0';
                    document.getElementById('project-parent-contract').value = 'HT20260000';
                    document.getElementById('project-commission').value = '10%';
                    document.getElementById('project-location').value = '四川省成都市武侯区';
                    document.getElementById('project-building').value = '万科金色家园';
                    document.getElementById('project-address').value = '四川省成都市武侯区万科路1号';
                    document.getElementById('project-sign-date').value = '2026-01-15';
                    document.getElementById('project-create-date').value = '2026-01-15';
                    document.getElementById('project-modify-date').value = '2026-01-16';
                    document.getElementById('project-source').value = 'svi';
                }
                
                // 禁用所有表单字段
                const formFields = projectDrawer.querySelectorAll('input, select, textarea');
                formFields.forEach(field => {
                    field.disabled = true;
                });
                
                // 隐藏保存和关闭按钮
                document.getElementById('cancel-project-btn').style.display = 'none';
                document.getElementById('save-project-btn').style.display = 'none';
                
                openDrawer(projectDrawer);
            };
            
            window.editProject = function(code) {
                projectDrawerTitle.textContent = '编辑项目';
                // 模拟数据填充
                if (code === 'PRO001') {
                    document.getElementById('project-company').value = '成都总公司';
                    document.getElementById('project-type').value = 'design';
                    document.getElementById('project-requirement').value = 'decoration';
                    document.getElementById('project-customer').value = '张三';
                    document.getElementById('project-customer-code').value = 'MER001';
                    document.getElementById('project-order').value = 'OD20260001';
                    document.getElementById('project-contract').value = 'HT20260001';
                    document.getElementById('project-contract-name').value = '家装设计合同';
                    document.getElementById('project-business').value = 'retail-shj-design';
                    document.getElementById('project-product-category').value = 'villa';
                    document.getElementById('project-product').value = '艺境名品5.0';
                    document.getElementById('project-parent-contract').value = 'HT20260000';
                    document.getElementById('project-commission').value = '10%';
                    document.getElementById('project-location').value = '四川省成都市武侯区';
                    document.getElementById('project-building').value = '万科金色家园';
                    document.getElementById('project-address').value = '四川省成都市武侯区万科路1号';
                    document.getElementById('project-sign-date').value = '2026-01-15';
                    document.getElementById('project-create-date').value = '2026-01-15';
                    document.getElementById('project-modify-date').value = '2026-01-16';
                    document.getElementById('project-source').value = 'svi';
                }
                
                // 启用所有表单字段（除了创建日期和修改日期）
                const formFields = projectDrawer.querySelectorAll('input, select, textarea');
                formFields.forEach(field => {
                    if (!field.id.includes('create-date') && !field.id.includes('modify-date')) {
                        field.disabled = false;
                    }
                });
                
                // 显示保存和关闭按钮
                document.getElementById('cancel-project-btn').style.display = 'block';
                document.getElementById('save-project-btn').style.display = 'block';
                
                openDrawer(projectDrawer);
            };
            
            closeProjectDrawer.addEventListener('click', () => {
                closeDrawer(projectDrawer);
            });
            
            cancelProjectBtn.addEventListener('click', () => {
                closeDrawer(projectDrawer);
            });
            
            saveProjectBtn.addEventListener('click', () => {
                alert('保存成功');
                closeDrawer(projectDrawer);
            });
            
            // 页签切换
            const tabs = document.querySelectorAll('#project-tabs button');
            const tabContents = document.querySelectorAll('.tab-content');
            const projectTypeSelect = document.getElementById('project-type');
            const designTab = document.querySelector('[data-tab="design"]');
            
            // 处理设计费信息页签的显示/隐藏逻辑
            function handleProjectTypeChange() {
                const projectType = projectTypeSelect.value;
                if (projectType === 'design') {
                    // 显示设计费信息页签
                    designTab.parentElement.classList.remove('hidden');
                } else {
                    // 隐藏设计费信息页签
                    designTab.parentElement.classList.add('hidden');
                    // 如果当前选中的是设计费信息页签，切换到基础信息页签
                    if (designTab.classList.contains('border-primary')) {
                        document.querySelector('[data-tab="basic"]').click();
                    }
                }
            }
            
            // 初始化设计费信息页签的显示状态
            handleProjectTypeChange();
            
            // 监听项目类型变化
            if (projectTypeSelect) {
                projectTypeSelect.addEventListener('change', handleProjectTypeChange);
            }
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.getAttribute('data-tab');
                    
                    // 移除所有页签的激活状态
                    tabs.forEach(t => {
                        t.classList.remove('border-primary', 'text-primary');
                        t.classList.add('border-transparent', 'text-gray-500');
                    });
                    
                    // 激活当前页签
                    tab.classList.remove('border-transparent', 'text-gray-500');
                    tab.classList.add('border-primary', 'text-primary');
                    
                    // 隐藏所有内容
                    tabContents.forEach(content => {
                        content.classList.add('hidden');
                    });
                    
                    // 显示当前内容
                    document.getElementById(`${tabId}-tab`).classList.remove('hidden');
                });
            });
        }
    </script>
