<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会计方法 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <link rel="stylesheet" href="common/styles.css">
</head>
<body class="bg-neutral">
    <!-- 主容器 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-6 transition-all duration-300 h-full" id="main-content">
            <div class="h-full">
                <div class="bg-white rounded-lg shadow-sm p-6 h-full flex flex-col">
                    <div class="border-b border-gray-200 pb-4 mb-6">
                        <h1 class="text-xl font-semibold text-gray-800">核算方法管理</h1>
                    </div>
                    <!-- 筛选条件和按钮栏 -->
                    <div class="flex items-center justify-between mb-6 flex-nowrap">
                        <div class="flex items-center space-x-2 flex-1">
                            <select id="filter-field-accounting-method" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="code">编码</option>
                                <option value="name">名称</option>
                                <option value="status">状态</option>
                            </select>
                            <input type="text" id="filter-value-accounting-method" placeholder="按编码搜索" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                            </button>
                            <button id="advanced-filter-btn-accounting-method" class="px-3 py-2 text-primary hover:bg-secondary rounded-md transition-colors flex items-center">
                                高级筛选
                                <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>
                            </button>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button id="add-method" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                                新增
                            </button>
                        </div>
                    </div>
                    
                    <!-- 高级筛选展开区域 -->
                    <div id="advanced-filter-accounting-method" class="hidden bg-gray-50 p-4 rounded-md border border-gray-200 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">编码</label>
                                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">名称</label>
                                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">项目类型</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="">全部</option>
                                    <option value="整装">整装</option>
                                    <option value="软装">软装</option>
                                    <option value="设计费">设计费</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">核算方法</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="">全部</option>
                                    <option value="完成合同法">完成合同法</option>
                                    <option value="完工百分比法">完工百分比法</option>
                                    <option value="收款确收">收款确收</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">生效日期</label>
                                <input type="date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="">全部</option>
                                    <option value="enabled">启用</option>
                                    <option value="disabled">停用</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-end space-x-2">
                            <button class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                                重置
                            </button>
                            <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                                查询
                            </button>
                        </div>
                    </div>
                    
                    <!-- 列表 -->
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">编码</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">名称</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">项目类型</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">核算方法</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">生效日期</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">时效日期</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">AM001</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">完成合同法</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">整装</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">完成合同法</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2026-01-01</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2026-12-31</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-method">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">AM002</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">完工百分比法</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">软装</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">完工百分比法</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2026-01-01</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2026-12-31</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-method">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">AM003</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">收款确收</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">设计费</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">收款确收</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2026-01-01</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2026-12-31</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-method">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="mt-auto flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            显示 1-3 条，共 3 条
                        </div>
                        <div class="flex space-x-1">
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                上一页
                            </button>
                            <button class="px-3 py-1 border border-primary bg-primary text-white rounded-md text-sm">1</button>
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                下一页
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑会计方法抽屉 -->
    <div id="method-drawer" class="drawer fixed top-0 right-0 h-full w-96 bg-white shadow-lg z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="drawer-title" class="text-lg font-semibold text-gray-900">新增会计方法</h3>
                <button id="close-drawer" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="method-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">编码 <span class="text-red-500">*</span></label>
                        <input type="text" id="method-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="method-name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">项目类型 <span class="text-red-500">*</span></label>
                        <select id="method-project-type" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                            <option value="">请选择项目类型</option>
                            <option value="整装">整装</option>
                            <option value="软装">软装</option>
                            <option value="设计费">设计费</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">核算方法 <span class="text-red-500">*</span></label>
                        <select id="method-accounting-type" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                            <option value="">请选择核算方法</option>
                            <option value="完成合同法">完成合同法</option>
                            <option value="完工百分比法">完工百分比法</option>
                            <option value="收款确收">收款确收</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">生效日期 <span class="text-red-500">*</span></label>
                        <input type="date" id="method-effective-date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">时效日期 <span class="text-red-500">*</span></label>
                        <input type="date" id="method-expiry-date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <div class="flex items-center">
                            <label class="switch">
                                <input type="checkbox" id="method-status" checked>
                                <span class="slider"></span>
                            </label>
                            <span class="ml-2 text-sm text-gray-700" id="status-text">启用</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" id="cancel-btn" class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 抽屉遮罩层 -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <script>
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 等待DOM更新完成
                setTimeout(() => {
                    // 加载公共脚本
                    const script = document.createElement('script');
                    script.src = 'common/scripts.js';
                    script.onload = function() {
                        // 脚本加载完成后初始化
                        if (typeof initCommonFunctions === 'function') {
                            initCommonFunctions();
                        }
                        // 初始化页面特定功能
                        initPageFunctions();
                    };
                    document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 初始化页面特定功能
        function initPageFunctions() {
            // 筛选条件选择器功能
            const filterSelect = document.getElementById('filter-field-accounting-method');
            const filterInput = document.getElementById('filter-value-accounting-method');

            filterSelect.addEventListener('change', function() {
                const selectedValue = this.value;
                
                // 根据选择的筛选条件更新占位符
                if (selectedValue === 'code') {
                    filterInput.placeholder = '按编码搜索';
                } else if (selectedValue === 'name') {
                    filterInput.placeholder = '按名称搜索';
                } else if (selectedValue === 'status') {
                    filterInput.placeholder = '按状态搜索';
                }
                
                // 清空输入框
                filterInput.value = '';
            });

            // 高级筛选功能
            const advancedFilterBtn = document.getElementById('advanced-filter-btn-accounting-method');
            const advancedFilter = document.getElementById('advanced-filter-accounting-method');

            advancedFilterBtn.addEventListener('click', function() {
                advancedFilter.classList.toggle('hidden');
                
                // 切换箭头图标
                const icon = this.querySelector('i');
                if (advancedFilter.classList.contains('hidden')) {
                    icon.setAttribute('data-lucide', 'chevron-down');
                } else {
                    icon.setAttribute('data-lucide', 'chevron-up');
                }
                
                // 重新渲染图标
                lucide.createIcons();
            });
            
            // 抽屉功能
            const addMethodBtn = document.getElementById('add-method');
            const methodDrawer = document.getElementById('method-drawer');
            const closeDrawerBtn = document.getElementById('close-drawer');
            const cancelBtn = document.getElementById('cancel-btn');
            const saveBtn = document.querySelector('#method-form button[type="submit"]');
            const drawerTitle = document.getElementById('drawer-title');
            const statusToggle = document.getElementById('method-status');
            const statusText = document.getElementById('status-text');
            
            addMethodBtn.addEventListener('click', () => {
                drawerTitle.textContent = '新增会计方法';
                document.getElementById('method-code').value = '';
                document.getElementById('method-name').value = '';
                document.getElementById('method-project-type').value = '';
                document.getElementById('method-accounting-type').value = '';
                document.getElementById('method-effective-date').value = '';
                document.getElementById('method-expiry-date').value = '';
                document.getElementById('method-status').checked = true;
                statusText.textContent = '启用';
                if (typeof openDrawer === 'function') {
                    openDrawer(methodDrawer);
                } else {
                    methodDrawer.classList.add('open');
                    document.getElementById('drawer-overlay').classList.add('open');
                }
            });
            
            // 编辑按钮点击事件
            document.querySelectorAll('.edit-method').forEach(btn => {
                btn.addEventListener('click', function() {
                    drawerTitle.textContent = '编辑会计方法';
                    // 填充表单数据（模拟）
                    document.getElementById('method-code').value = 'AM001';
                    document.getElementById('method-name').value = '完成合同法';
                    document.getElementById('method-project-type').value = '整装';
                    document.getElementById('method-accounting-type').value = '完成合同法';
                    document.getElementById('method-effective-date').value = '2026-01-01';
                    document.getElementById('method-expiry-date').value = '2026-12-31';
                    document.getElementById('method-status').checked = true;
                    statusText.textContent = '启用';
                    if (typeof openDrawer === 'function') {
                        openDrawer(methodDrawer);
                    } else {
                        methodDrawer.classList.add('open');
                        document.getElementById('drawer-overlay').classList.add('open');
                    }
                });
            });
            
            closeDrawerBtn.addEventListener('click', () => {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(methodDrawer);
                } else {
                    methodDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            });
            
            cancelBtn.addEventListener('click', () => {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(methodDrawer);
                } else {
                    methodDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            });
            
            saveBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // 模拟保存
                alert('保存成功');
                if (typeof closeDrawer === 'function') {
                    closeDrawer(methodDrawer);
                } else {
                    methodDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            });
            
            // 状态切换文本更新
            statusToggle.addEventListener('change', function() {
                statusText.textContent = this.checked ? '启用' : '停用';
            });
        }
        
        // 页面加载完成后加载侧边栏
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadSidebar);
        } else {
            loadSidebar();
        }
    </script>
</body>
</html>
