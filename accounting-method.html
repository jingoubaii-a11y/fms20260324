<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核算方法管理 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <link rel="stylesheet" href="common/styles.css">
    <style>
        .req-badge {
            display: inline-block;
            vertical-align: top;
            background-color: rgb(250, 173, 20);
            color: white;
            font-size: 11px;
            font-weight: bold;
            line-height: 16px;
            padding: 0px 5px;
            border-radius: 2px;
            border: none;
            cursor: pointer;
            position: absolute;
            top: -10px;
            right: -6px;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }
        .req-badge-float {
            display: inline-block;
            vertical-align: top;
            background-color: rgb(250, 173, 20);
            color: white;
            font-size: 11px;
            font-weight: bold;
            line-height: 16px;
            padding: 0px 5px;
            border-radius: 2px;
            border: none;
            cursor: pointer;
            position: fixed !important;
            z-index: 9999;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            pointer-events: auto;
            white-space: nowrap;
        }
        .req-badge-float:hover {
            transform: scale(1.15);
            box-shadow: 0 3px 12px rgba(250,173,20,0.6);
            z-index: 10000;
        }
        .req-marker {
            position: relative;
            display: inline-block;
            padding-top: 12px;
        }
        .req-marker > *:first-child {
            margin-top: -12px;
        }
        .req-tooltip {
            position: fixed;
            background-color: #f0efef;
            border-radius: 4px;
            width: 450px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 9999;
            display: none;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .req-tooltip.show { display: block; }
        .req-tooltip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        .req-tooltip-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        .req-tooltip-close {
            cursor: pointer;
            color: #999;
            font-size: 18px;
            line-height: 1;
            padding: 2px 6px;
        }
        .req-tooltip-close:hover { color: #333; }
        .req-tooltip-content {
            font-size: 13px;
            line-height: 1.6;
            color: #444;
        }
        .req-tooltip-content p { margin-bottom: 12px; }
        .req-tooltip-content ul { padding-left: 20px; margin-bottom: 12px; }
        .req-tooltip-content li { margin-bottom: 6px; }
        .req-tooltip-content strong { color: #222; }
        .req-tooltip-content em { color: #666; font-style: italic; }
        .req-tooltip-content blockquote {
            border-left: 3px solid #ccc;
            padding-left: 12px;
            margin: 8px 0;
            color: #666;
            background: #fafafa;
            padding: 8px 12px;
        }
        .req-section-title {
            font-weight: bold;
            color: #333;
            margin-top: 12px;
            margin-bottom: 8px;
        }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-green { background-color: #52c41a; }
        .status-red { background-color: #ff4d4f; }
        .status-gray { background-color: #999; }
        .status-blue { background-color: #1890ff; }
        .status-orange { background-color: #faad14; }
        .table-wrapper {
            display: block;
            width: 100%;
            overflow-x: auto;
        }
        .drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 15;
            display: none;
        }
        .drawer-overlay.open {
            display: block;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #003eb3;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

    <!-- 新增/编辑核算方法抽屉 -->

        <div class="req-marker block" id="req-marker-3">
            <span class="req-badge" data-req="3" data-title="需求描述：新增/编辑核算方法表单" data-content='<div class="req-section-title">表单字段清单（8个）</div><ul><li><strong>编码</strong>：<ul><li>字符串类型</li><li>最大长度：32位</li><li><em>必填</em></li></ul></li><li><strong>名称</strong>：<ul><li>字符串类型</li><li>最大长度：64位</li><li><em>必填</em></li></ul></li><li><strong>项目类型</strong>：<ul><li>下拉单选</li><li>枚举值：整装、软装、设计费</li><li><em>必填</em></li></ul></li><li><strong>核算方法</strong>：<ul><li>下拉单选</li><li>枚举值：完成合同法、完工百分比法、收款确收</li><li><em>必填</em></li></ul></li><li><strong>状态</strong>：Switch按钮（启用/停用），<em>无逻辑判断</em></li><li><strong>生效日期</strong>：<ul><li>日期选择器</li><li><em>限制：最早只能选择今天</em></li><li><em>必填</em></li></ul></li><li><strong>失效日期</strong>：<ul><li>日期选择器</li><li><em>限制：最早只能选择今天</em></li><li><em>必填</em></li></ul></li></ul><div class="req-section-title">操作按钮</div><ul><li><strong>保存</strong>：<blockquote>校验规则：<br/>• 启用状态下，<em>同一项目类型的生效和失效日期不能有重合</em><br/>• 且<em>生效日期不能早于失效日期</em></blockquote></li><li><strong>关闭</strong>：关闭抽屉弹窗</li></ul>'>3</span>

    <script>
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;

                setTimeout(() => {
                    const script = document.createElement('script');
                    script.src = 'common/scripts.js';
                    script.onload = function() {
                        if (typeof initCommonFunctions === 'function') {
                            initCommonFunctions();
                        }
                        initPageFunctions();
                    };
                    document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }

        function initPageFunctions() {
            lucide.createIcons();

            // 高级筛选展开/收起
            document.querySelectorAll('.advanced-filter-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var filterId = this.getAttribute('data-filter');
                    var filterEl = document.getElementById(filterId);
                    if (filterEl) {
                        filterEl.classList.toggle('hidden');
                        var icon = this.querySelector('i');
                        if (icon) {
                            if (filterEl.classList.contains('hidden')) {
                                icon.setAttribute('data-lucide', 'chevron-down');
                            } else {
                                icon.setAttribute('data-lucide', 'chevron-up');
                            }
                            lucide.createIcons();
                        }
                    }
                });
            });

            // 搜索按钮功能
            document.querySelectorAll('.search-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    alert('执行查询操作');
                });
            });

            // 刷新按钮功能
            document.querySelectorAll('.refresh-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    location.reload();
                });
            });

            const drawer = document.getElementById('method-drawer');
            const drawerOverlay = document.getElementById('drawer-overlay');
            const addBtn = document.getElementById('add-btn');
            const closeBtn = document.getElementById('close-drawer-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const saveBtn = document.getElementById('save-btn');
            const drawerTitle = document.getElementById('drawer-title');

            function openDrawer() {
                drawer.classList.add('open');
                drawerOverlay.classList.add('open');
            }

            function closeDrawer() {
                drawer.classList.remove('open');
                drawerOverlay.classList.remove('open');
                resetForm();
            }

            function resetForm() {
                document.getElementById('method-code').value = '';
                document.getElementById('method-name').value = '';
                document.getElementById('project-type').value = '';
                document.getElementById('accounting-method').value = '';
                document.getElementById('method-status').checked = true;
                document.getElementById('status-text').textContent = '启用';
                document.getElementById('effective-date').value = '';
                document.getElementById('expiry-date').value = '';
            }

            addBtn.addEventListener('click', () => {
                drawerTitle.textContent = '新增核算方法';
                resetForm();
                openDrawer();
            });

            closeBtn.addEventListener('click', closeDrawer);
            cancelBtn.addEventListener('click', closeDrawer);
            drawerOverlay.addEventListener('click', closeDrawer);

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    drawerTitle.textContent = '编辑核算方法';
                    openDrawer();
                });
            });

            document.getElementById('method-status').addEventListener('change', function() {
                document.getElementById('status-text').textContent = this.checked ? '启用' : '停用';
            });

            saveBtn.addEventListener('click', () => {
                const code = document.getElementById('method-code').value;
                const name = document.getElementById('method-name').value;
                const projectType = document.getElementById('project-type').value;
                const accountingMethod = document.getElementById('accounting-method').value;
                const effectiveDate = document.getElementById('effective-date').value;
                const expiryDate = document.getElementById('expiry-date').value;

                if (!code || !name || !projectType || !accountingMethod || !effectiveDate || !expiryDate) {
                    alert('请填写所有必填项');
                    return;
                }

                if (new Date(effectiveDate) > new Date(expiryDate)) {
                    alert('生效日期不能晚于失效日期');
                    return;
                }

                alert('保存成功');
                closeDrawer();
            });

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('effective-date').min = today;
            document.getElementById('expiry-date').min = today;
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadSidebar);
        } else {
            loadSidebar();
        }
    </script>

    <div id="req-tooltip-container"></div>
    <script src="js/req-annotation.js"></script>
</body>
</html>
