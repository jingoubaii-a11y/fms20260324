<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量单位 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            transition: width 0.3s ease-in-out;
            overflow-y: auto;
            height: 100vh;
        }
        
        .sidebar.collapsed {
            width: 64px;
        }
        
        .sidebar.collapsed .sidebar-text {
            display: none;
        }
        
        .sidebar.collapsed .sidebar-icon {
            margin: 0 auto;
        }
        
        .sidebar-item {
            transition: all 0.2s ease-in-out;
            font-size: 0.875rem;
        }
        
        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 500;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #003eb3 0%, #0056c7 100%);
        }
        
        .menu-header h2 {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        
        .drawer.open {
            transform: translateX(0);
        }
        
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 15;
            display: none;
        }
        
        .drawer-overlay.open {
            display: block;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #003eb3;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        
        .unit-group-tree {
            list-style: none;
            padding-left: 0;
        }
        
        .unit-group-tree li {
            margin: 2px 0;
        }
        
        .unit-group-tree .tree-node {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .unit-group-tree .tree-node:hover {
            background-color: rgba(0, 62, 179, 0.1);
        }
        
        .unit-group-tree .tree-node.active {
            background-color: rgba(0, 62, 179, 0.2);
            color: #003eb3;
        }
        
        .tree-toggle {
            margin-right: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .unit-group-tree .children {
            padding-left: 20px;
            margin-top: 2px;
        }
    </style>
</head>
<body class="bg-neutral">
    <!-- 主容器 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-6 transition-all duration-300 h-full" id="main-content">
            <div class="h-full">
                <div class="bg-white rounded-lg shadow-sm p-6 h-full flex flex-col">
                    <div class="border-b border-gray-200 pb-4 mb-6">
                        <h1 class="text-xl font-semibold text-gray-800">计量单位</h1>
                        <p class="text-gray-600 mt-1">统一管理计量单位基础信息，确保核算口径一致</p>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 flex-1">
                        <!-- 左侧计量单位组 -->
                        <div class="lg:col-span-1">
                            <div class="bg-white border border-gray-200 rounded-lg p-4 h-full">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-sm font-semibold text-gray-700">计量单位组</h3>
                                    <div class="flex space-x-2">
                                        <button id="add-group" class="p-1 text-primary hover:bg-secondary rounded">
                                            <i data-lucide="plus" class="w-4 h-4"></i>
                                        </button>
                                        <button id="edit-group" class="p-1 text-primary hover:bg-secondary rounded">
                                            <i data-lucide="edit" class="w-4 h-4"></i>
                                        </button>
                                        <button id="delete-group" class="p-1 text-accent hover:bg-red-50 rounded">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                <ul class="unit-group-tree">
                                    <li>
                                        <div class="tree-node active">
                                            <span class="tree-toggle">▼</span>
                                            <span>基本单位</span>
                                        </div>
                                        <ul class="children pl-6">
                                            <li>
                                                <div class="tree-node">
                                                    <span class="tree-toggle">►</span>
                                                    <span>长度</span>
                                                </div>
                                            </li>
                                            <li>
                                                <div class="tree-node">
                                                    <span class="tree-toggle">►</span>
                                                    <span>重量</span>
                                                </div>
                                            </li>
                                            <li>
                                                <div class="tree-node">
                                                    <span class="tree-toggle">►</span>
                                                    <span>体积</span>
                                                </div>
                                            </li>
                                            <li>
                                                <div class="tree-node">
                                                    <span class="tree-toggle">►</span>
                                                    <span>数量</span>
                                                </div>
                                            </li>
                                        </ul>
                                    </li>
                                    <li>
                                        <div class="tree-node">
                                            <span class="tree-toggle">►</span>
                                            <span>复合单位</span>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        
                        <!-- 右侧计量单位列表 -->
                        <div class="lg:col-span-3">
                            <!-- 筛选条件和按钮栏 -->
                            <div class="flex items-center justify-between mb-6 flex-nowrap">
                                <div class="flex items-center space-x-2 flex-1">
                                    <select id="filter-field-unit" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                        <option value="code">计量单位编码</option>
                                        <option value="name">计量单位名称</option>
                                        <option value="status">状态</option>
                                    </select>
                                    <input type="text" id="filter-value-unit" placeholder="按计量单位编码搜索" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                        <i data-lucide="search" class="w-4 h-4"></i>
                                    </button>
                                    <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                        <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                                    </button>
                                    <button id="advanced-filter-btn-unit" class="px-3 py-2 text-primary hover:bg-secondary rounded-md transition-colors flex items-center">
                                        高级筛选
                                        <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>
                                    </button>
                                </div>
                                <div class="flex items-center space-x-3">
                                    <button id="add-unit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors flex items-center">
                                        <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                                        新增
                                    </button>
                                </div>
                            </div>
                            
                            <!-- 高级筛选展开区域 -->
                            <div id="advanced-filter-unit" class="hidden bg-gray-50 p-4 rounded-md border border-gray-200 mb-6">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">计量单位编码</label>
                                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">计量单位名称</label>
                                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                                        <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                            <option value="">全部</option>
                                            <option value="enabled">启用</option>
                                            <option value="disabled">停用</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mt-4 flex justify-end space-x-2">
                                    <button class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                                        重置
                                    </button>
                                    <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                                        查询
                                    </button>
                                </div>
                            </div>
                            
                            <!-- 批量操作 -->
                            <div class="mb-4 flex items-center">
                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                <span class="ml-2 text-sm text-gray-700">全选</span>
                            </div>
                            
                            <!-- 列表 -->
                            <div class="overflow-x-auto">
                                <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                            </th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">计量单位编码</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">计量单位名称</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">精度</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-200">
                                        <tr>
                                            <td class="px-4 py-2">
                                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                            </td>
                                            <td class="px-4 py-2 text-sm text-gray-700">UNIT001</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">米</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">2</td>
                                            <td class="px-4 py-2">
                                                <label class="switch">
                                                    <input type="checkbox" checked>
                                                    <span class="slider"></span>
                                                </label>
                                            </td>
                                            <td class="px-4 py-2 text-sm">
                                                <div class="flex space-x-2">
                                                    <button class="text-primary hover:text-blue-700 edit-unit">编辑</button>
                                                    <button class="text-accent hover:text-red-700 delete-unit">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="px-4 py-2">
                                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                            </td>
                                            <td class="px-4 py-2 text-sm text-gray-700">UNIT002</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">千克</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">3</td>
                                            <td class="px-4 py-2">
                                                <label class="switch">
                                                    <input type="checkbox" checked>
                                                    <span class="slider"></span>
                                                </label>
                                            </td>
                                            <td class="px-4 py-2 text-sm">
                                                <div class="flex space-x-2">
                                                    <button class="text-primary hover:text-blue-700 edit-unit">编辑</button>
                                                    <button class="text-accent hover:text-red-700 delete-unit">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="px-4 py-2">
                                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                            </td>
                                            <td class="px-4 py-2 text-sm text-gray-700">UNIT003</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">立方米</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">2</td>
                                            <td class="px-4 py-2">
                                                <label class="switch">
                                                    <input type="checkbox" checked>
                                                    <span class="slider"></span>
                                                </label>
                                            </td>
                                            <td class="px-4 py-2 text-sm">
                                                <div class="flex space-x-2">
                                                    <button class="text-primary hover:text-blue-700 edit-unit">编辑</button>
                                                    <button class="text-accent hover:text-red-700 delete-unit">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="px-4 py-2">
                                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                            </td>
                                            <td class="px-4 py-2 text-sm text-gray-700">UNIT004</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">个</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">0</td>
                                            <td class="px-4 py-2">
                                                <label class="switch">
                                                    <input type="checkbox" checked>
                                                    <span class="slider"></span>
                                                </label>
                                            </td>
                                            <td class="px-4 py-2 text-sm">
                                                <div class="flex space-x-2">
                                                    <button class="text-primary hover:text-blue-700 edit-unit">编辑</button>
                                                    <button class="text-accent hover:text-red-700 delete-unit">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="px-4 py-2">
                                                <input type="checkbox" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                            </td>
                                            <td class="px-4 py-2 text-sm text-gray-700">UNIT005</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">件</td>
                                            <td class="px-4 py-2 text-sm text-gray-700">0</td>
                                            <td class="px-4 py-2">
                                                <label class="switch">
                                                    <input type="checkbox">
                                                    <span class="slider"></span>
                                                </label>
                                            </td>
                                            <td class="px-4 py-2 text-sm">
                                                <div class="flex space-x-2">
                                                    <button class="text-primary hover:text-blue-700 edit-unit">编辑</button>
                                                    <button class="text-accent hover:text-red-700 delete-unit">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            
                            <!-- 分页 -->
                            <div class="mt-auto flex items-center justify-between">
                                <div class="text-sm text-gray-500">
                                    显示 1-5 条，共 5 条
                                </div>
                                <div class="flex space-x-1">
                                    <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                        上一页
                                    </button>
                                    <button class="px-3 py-1 border border-primary bg-primary text-white rounded-md text-sm">1</button>
                                    <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                        下一页
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 新增/编辑计量单位组抽屉 -->
    <div id="group-drawer" class="drawer fixed top-0 right-0 h-full w-96 bg-white shadow-lg z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="group-drawer-title" class="text-lg font-semibold text-gray-900">新增计量单位组</h3>
                <button id="close-group-drawer" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="group-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">计量单位组编码 <span class="text-red-500">*</span></label>
                        <input type="text" id="group-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">计量单位组名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="group-name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">说明</label>
                        <textarea id="group-desc" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" rows="3"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 flex justify-end space-x-3">
                    <button type="button" id="cancel-group-btn" class="px-4 py-2 border border-gray-300 rounded-md">取消</button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 新增/编辑计量单位抽屉 -->
    <div id="unit-drawer" class="drawer fixed top-0 right-0 h-full w-96 bg-white shadow-lg z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="unit-drawer-title" class="text-lg font-semibold text-gray-900">新增计量单位</h3>
                <button id="close-unit-drawer" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="unit-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">计量单位编码 <span class="text-red-500">*</span></label>
                        <input type="text" id="unit-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">计量单位名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="unit-name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">精度 <span class="text-red-500">*</span></label>
                        <input type="number" id="unit-precision" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" min="0" max="6" value="0" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <div class="flex items-center">
                            <label class="switch">
                                <input type="checkbox" id="unit-status" checked>
                                <span class="slider"></span>
                            </label>
                            <span class="ml-2 text-sm text-gray-700" id="unit-status-text">启用</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 flex justify-end space-x-3">
                    <button type="button" id="cancel-unit-btn" class="px-4 py-2 border border-gray-300 rounded-md">取消</button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 抽屉遮罩 -->
    <div id="drawer-overlay" class="drawer-overlay fixed inset-0 bg-black bg-opacity-50 z-40"></div>
    
    <script>
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 等待DOM更新完成
                setTimeout(() => {
                    // 加载公共脚本
                    const script = document.createElement('script');
                    script.src = 'common/scripts.js';
                    script.onload = function() {
                        // 脚本加载完成后初始化
                        if (typeof initCommonFunctions === 'function') {
                            initCommonFunctions();
                        }
                        // 初始化页面特定功能
                        initPageFunctions();
                    };
                    document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 初始化页面特定功能
        function initPageFunctions() {
            // 树节点点击事件
            document.querySelectorAll('.tree-node').forEach(node => {
                node.addEventListener('click', function() {
                    // 移除其他节点的活动状态
                    document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
                    // 添加当前节点的活动状态
                    this.classList.add('active');
                    // 切换展开/折叠状态
                    const toggle = this.querySelector('.tree-toggle');
                    if (toggle.textContent === '▼') {
                        toggle.textContent = '►';
                    } else if (toggle.textContent === '►') {
                        toggle.textContent = '▼';
                    }
                });
            });
            
            // 计量单位组抽屉功能
            const groupDrawer = document.getElementById('group-drawer');
            const addGroupBtn = document.getElementById('add-group');
            const editGroupBtn = document.getElementById('edit-group');
            const closeGroupDrawer = document.getElementById('close-group-drawer');
            const cancelGroupBtn = document.getElementById('cancel-group-btn');
            
            // 打开计量单位组抽屉
            function openGroupDrawer(title) {
                document.getElementById('group-drawer-title').textContent = title;
                if (typeof openDrawer === 'function') {
                    openDrawer(groupDrawer);
                } else {
                    groupDrawer.classList.add('open');
                    document.getElementById('drawer-overlay').classList.add('open');
                }
            }
            
            // 关闭计量单位组抽屉
            function closeGroupDrawerFunc() {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(groupDrawer);
                } else {
                    groupDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            }
            
            // 新增计量单位组按钮点击事件
            addGroupBtn.addEventListener('click', function() {
                openGroupDrawer('新增计量单位组');
                // 重置表单
                document.getElementById('group-form').reset();
            });
            
            // 编辑计量单位组按钮点击事件
            editGroupBtn.addEventListener('click', function() {
                openGroupDrawer('编辑计量单位组');
                // 填充表单数据（模拟）
                document.getElementById('group-code').value = 'GROUP001';
                document.getElementById('group-name').value = '基本单位';
                document.getElementById('group-desc').value = '基础计量单位组';
            });
            
            // 删除计量单位组按钮点击事件
            const deleteGroupBtn = document.getElementById('delete-group');
            deleteGroupBtn.addEventListener('click', function() {
                if (confirm('确定要删除选中的计量单位组吗？')) {
                    // 模拟删除操作
                    alert('删除成功！');
                }
            });
            
            // 关闭计量单位组抽屉事件
            closeGroupDrawer.addEventListener('click', closeGroupDrawerFunc);
            cancelGroupBtn.addEventListener('click', closeGroupDrawerFunc);
            
            // 计量单位抽屉功能
            const unitDrawer = document.getElementById('unit-drawer');
            const addUnitBtn = document.getElementById('add-unit');
            const closeUnitDrawer = document.getElementById('close-unit-drawer');
            const cancelUnitBtn = document.getElementById('cancel-unit-btn');
            const unitStatusToggle = document.getElementById('unit-status');
            const unitStatusText = document.getElementById('unit-status-text');
            
            // 打开计量单位抽屉
            function openUnitDrawer(title) {
                document.getElementById('unit-drawer-title').textContent = title;
                if (typeof openDrawer === 'function') {
                    openDrawer(unitDrawer);
                } else {
                    unitDrawer.classList.add('open');
                    document.getElementById('drawer-overlay').classList.add('open');
                }
            }
            
            // 关闭计量单位抽屉
            function closeUnitDrawerFunc() {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(unitDrawer);
                } else {
                    unitDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            }
            
            // 新增计量单位按钮点击事件
            addUnitBtn.addEventListener('click', function() {
                openUnitDrawer('新增计量单位');
                // 重置表单
                document.getElementById('unit-form').reset();
                document.getElementById('unit-status').checked = true;
                unitStatusText.textContent = '启用';
            });
            
            // 编辑计量单位按钮点击事件
            document.querySelectorAll('.edit-unit').forEach(btn => {
                btn.addEventListener('click', function() {
                    openUnitDrawer('编辑计量单位');
                    // 填充表单数据（模拟）
                    document.getElementById('unit-code').value = 'UNIT001';
                    document.getElementById('unit-name').value = '米';
                    document.getElementById('unit-precision').value = '2';
                    document.getElementById('unit-status').checked = true;
                    unitStatusText.textContent = '启用';
                });
            });
            
            // 删除计量单位按钮点击事件
            document.querySelectorAll('.delete-unit').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (confirm('确定要删除选中的计量单位吗？')) {
                        // 模拟删除操作
                        alert('删除成功！');
                    }
                });
            });
            
            // 关闭计量单位抽屉事件
            closeUnitDrawer.addEventListener('click', closeUnitDrawerFunc);
            cancelUnitBtn.addEventListener('click', closeUnitDrawerFunc);
            
            // 状态切换文本更新
            unitStatusToggle.addEventListener('change', function() {
                unitStatusText.textContent = this.checked ? '启用' : '停用';
            });
            
            // 遮罩点击事件
            document.getElementById('drawer-overlay').addEventListener('click', function() {
                closeGroupDrawerFunc();
                closeUnitDrawerFunc();
            });
            
            // 表单提交事件
            document.getElementById('group-form').addEventListener('submit', function(e) {
                e.preventDefault();
                // 模拟提交
                alert('保存成功！');
                closeGroupDrawerFunc();
            });
            
            document.getElementById('unit-form').addEventListener('submit', function(e) {
                e.preventDefault();
                // 模拟提交
                alert('保存成功！');
                closeUnitDrawerFunc();
            });
            
            // 高级筛选功能
            const advancedFilterBtnUnit = document.getElementById('advanced-filter-btn-unit');
            const advancedFilterUnit = document.getElementById('advanced-filter-unit');
            
            advancedFilterBtnUnit.addEventListener('click', function() {
                advancedFilterUnit.classList.toggle('hidden');
                
                // 切换箭头图标
                const icon = this.querySelector('i');
                if (advancedFilterUnit.classList.contains('hidden')) {
                    icon.setAttribute('data-lucide', 'chevron-down');
                } else {
                    icon.setAttribute('data-lucide', 'chevron-up');
                }
                
                // 重新渲染图标
                lucide.createIcons();
            });
        }
        
        // 初始化Lucide图标
        lucide.createIcons();
        
        // 加载侧边栏
        loadSidebar();
    </script>

    <!-- PRD Viewer -->
    <link rel="stylesheet" href="common/prd-viewer.css">
    <script src="common/prd-viewer.js" defer></script>
</body>
</html>
