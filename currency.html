<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>币别管理 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <link rel="stylesheet" href="common/styles.css">
</head>
<body class="bg-neutral">
    <!-- 主容器 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-6 transition-all duration-300 h-full" id="main-content">
            <div class="h-full">
                <div class="bg-white rounded-lg shadow-sm p-6 h-full flex flex-col">
                    <div class="border-b border-gray-200 pb-4 mb-6">
                        <h1 class="text-xl font-semibold text-gray-800">币别管理</h1>
                    </div>
                    <!-- 筛选条件和按钮栏 -->
                    <div class="flex items-center justify-between mb-6 flex-nowrap">
                        <div class="flex items-center space-x-2 flex-1">
                            <select id="filter-field-currency" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="code">编码</option>
                                <option value="name">名称</option>
                                <option value="status">状态</option>
                            </select>
                            <input type="text" id="filter-value-currency" placeholder="按编码搜索" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                            </button>
                            <button id="advanced-filter-btn-currency" class="px-3 py-2 text-primary hover:bg-secondary rounded-md transition-colors flex items-center">
                                高级筛选
                                <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>
                            </button>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button id="add-currency" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                                新增
                            </button>
                        </div>
                    </div>
                    
                    <!-- 高级筛选展开区域 -->
                    <div id="advanced-filter-currency" class="hidden bg-gray-50 p-4 rounded-md border border-gray-200 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">编码</label>
                                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">名称</label>
                                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="">全部</option>
                                    <option value="enabled">启用</option>
                                    <option value="disabled">停用</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-end space-x-2">
                            <button class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                                重置
                            </button>
                            <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                                查询
                            </button>
                        </div>
                    </div>
                    
                    <!-- 列表 -->
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">币别编码</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">币别名称</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">货币代码</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">是否默认</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">单价精度</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">金额精度</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">CNY</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">人民币</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">CNY</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">是</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">6</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-currency">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">USD</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">美元</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">USD</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">否</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">6</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-currency">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">EUR</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">欧元</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">EUR</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">否</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">6</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-currency">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">JPY</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">日元</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">JPY</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">否</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">6</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">2</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-currency">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="mt-auto flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            显示 1-4 条，共 4 条
                        </div>
                        <div class="flex space-x-1">
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                上一页
                            </button>
                            <button class="px-3 py-1 border border-primary bg-primary text-white rounded-md text-sm">1</button>
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                下一页
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑币别抽屉 -->
    <div id="currency-drawer" class="drawer fixed top-0 right-0 h-full w-96 bg-white shadow-lg z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="drawer-title" class="text-lg font-semibold text-gray-900">新增币别</h3>
                <button id="close-drawer" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="currency-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">币别编码 <span class="text-red-500">*</span></label>
                        <input type="text" id="currency-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">币别名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="currency-name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">货币代码 <span class="text-red-500">*</span></label>
                        <input type="text" id="currency-currency-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">是否默认</label>
                        <div class="flex items-center">
                            <label class="switch">
                                <input type="checkbox" id="currency-default">
                                <span class="slider"></span>
                            </label>
                            <span class="ml-2 text-sm text-gray-700" id="default-text">否</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">单价精度 <span class="text-red-500">*</span></label>
                        <input type="number" id="currency-price-precision" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" min="0" value="6" required>
                        <p class="text-xs text-gray-500 mt-1">默认6，有业务发生则不允许随意更改，校验只需改大，不许改小</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">金额精度 <span class="text-red-500">*</span></label>
                        <input type="number" id="currency-amount-precision" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" min="0" value="2" required>
                        <p class="text-xs text-gray-500 mt-1">默认2，有业务发生则不允许随意更改，校验只需改大，不许改小</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <div class="flex items-center">
                            <label class="switch">
                                <input type="checkbox" id="currency-status" checked>
                                <span class="slider"></span>
                            </label>
                            <span class="ml-2 text-sm text-gray-700" id="status-text">启用</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" id="cancel-btn" class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 抽屉遮罩层 -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <script>
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 等待DOM更新完成
                setTimeout(() => {
                    // 加载公共脚本
                const script = document.createElement('script');
                script.src = 'common/scripts.js';
                script.onload = function() {
                    // 脚本加载完成后初始化
                    if (typeof initCommonFunctions === 'function') {
                        initCommonFunctions();
                    }
                    // 初始化页面特定功能
                    initPageFunctions();
                };
                document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 页面加载完成后加载侧边栏
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadSidebar);
        } else {
            loadSidebar();
        }

        // 初始化页面特定功能
        function initPageFunctions() {
            // 新增按钮点击事件
            const addBtn = document.getElementById('add-currency');
            const drawer = document.getElementById('currency-drawer');
            
            if (addBtn && drawer) {
                addBtn.addEventListener('click', function() {
                    // 确保openDrawer函数可用
                    if (typeof openDrawer === 'function') {
                        openDrawer(drawer);
                    } else {
                        // 如果openDrawer函数不可用，直接添加open类
                        drawer.classList.add('open');
                        const drawerOverlay = document.getElementById('drawer-overlay');
                        if (drawerOverlay) {
                            drawerOverlay.classList.add('open');
                        }
                    }
                });
            }
            
            // 关闭抽屉按钮
            const closeDrawerBtn = document.getElementById('close-drawer');
            const cancelBtn = document.getElementById('cancel-btn');
            
            if (closeDrawerBtn && drawer) {
                closeDrawerBtn.addEventListener('click', function() {
                    if (typeof closeDrawer === 'function') {
                        closeDrawer(drawer);
                    } else {
                        drawer.classList.remove('open');
                        const drawerOverlay = document.getElementById('drawer-overlay');
                        if (drawerOverlay) {
                            drawerOverlay.classList.remove('open');
                        }
                    }
                });
            }
            
            if (cancelBtn && drawer) {
                cancelBtn.addEventListener('click', function() {
                    if (typeof closeDrawer === 'function') {
                        closeDrawer(drawer);
                    } else {
                        drawer.classList.remove('open');
                        const drawerOverlay = document.getElementById('drawer-overlay');
                        if (drawerOverlay) {
                            drawerOverlay.classList.remove('open');
                        }
                    }
                });
            }
            
            // 编辑按钮点击事件
            const editButtons = document.querySelectorAll('.edit-currency');
            editButtons.forEach(button => {
                button.addEventListener('click', function() {
                    if (typeof openDrawer === 'function') {
                        openDrawer(drawer);
                    } else {
                        drawer.classList.add('open');
                        const drawerOverlay = document.getElementById('drawer-overlay');
                        if (drawerOverlay) {
                            drawerOverlay.classList.add('open');
                        }
                    }
                    // 这里可以添加填充编辑数据的逻辑
                });
            });
            
            // 是否默认开关状态切换
            const defaultSwitch = drawer.querySelector('#currency-default');
            const defaultText = drawer.querySelector('#default-text');
            if (defaultSwitch && defaultText) {
                defaultSwitch.addEventListener('change', function() {
                    defaultText.textContent = this.checked ? '是' : '否';
                });
            }
        }
        
        // 页面加载完成后初始化页面特定功能
        document.addEventListener('DOMContentLoaded', function() {
            // 等待公共脚本加载完成
            setTimeout(initPageFunctions, 300);
        });
    </script>

    <!-- PRD Viewer -->
    <link rel="stylesheet" href="common/prd-viewer.css">
    <script src="common/prd-viewer.js" defer></script>
</body>
</html>
