<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>税率 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .sidebar {
            transition: width 0.3s ease-in-out;
        }
        
        .sidebar.collapsed {
            width: 64px;
        }
        
        .sidebar.collapsed .sidebar-text {
            display: none;
        }
        
        .sidebar.collapsed .sidebar-icon {
            margin: 0 auto;
        }
        
        .sidebar-item {
            transition: all 0.2s ease-in-out;
            font-size: 0.875rem;
        }
        
        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 500;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #003eb3 0%, #0056c7 100%);
        }
        
        .menu-header h2 {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        
        .drawer.open {
            transform: translateX(0);
        }
        
        .drawer-overlay {
            display: none;
        }
        
        .drawer-overlay.open {
            display: block;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #003eb3;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body class="bg-neutral min-h-screen">
    <!-- 主容器 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-6 transition-all duration-300 overflow-y-auto" id="main-content">
            <div class="bg-white rounded-lg shadow-sm p-6">
                <div class="border-b border-gray-200 pb-4 mb-6">
                    <h1 class="text-xl font-semibold text-gray-800">税率</h1>
                </div>
                
                <!-- 搜索条件和按钮 -->
                <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1 flex items-center space-x-2">
                        <!-- 筛选条件选择器 -->
                        <select id="filter-select" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none text-sm">
                            <option value="code">税率编码</option>
                            <option value="name">税率名称</option>
                            <option value="status">状态</option>
                        </select>
                        
                        <!-- 输入框 -->
                        <input type="text" id="filter-input" placeholder="按税率编码搜索" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        
                        <!-- 搜索按钮 -->
                        <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                            <i data-lucide="search" class="w-4 h-4"></i>
                        </button>
                        
                        <!-- 刷新按钮 -->
                        <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                            <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                        </button>
                        
                        <!-- 高级筛选按钮 -->
                        <button id="advanced-filter-btn" class="px-3 py-2 text-primary hover:bg-secondary rounded-md transition-colors flex items-center">
                            高级筛选
                            <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>
                        </button>
                    </div>
                    
                    <!-- 按钮组 -->
                    <div class="flex space-x-3">
                        <button id="add-tax-rate" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors flex items-center">
                            <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                            新增税率
                        </button>
                    </div>
                </div>
                
                <!-- 高级筛选条件 -->
                <div id="advanced-filter" class="mb-6 grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">税率编码</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">税率名称</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            <option value="">全部</option>
                            <option value="enabled">启用</option>
                            <option value="disabled">停用</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex justify-end space-x-2">
                        <button class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                            重置
                        </button>
                        <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                            查询
                        </button>
                    </div>
                </div>
                
                <!-- 税率列表 -->
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">税率编码</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">税率名称</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">说明</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr>
                                <td class="px-4 py-2 text-sm text-gray-700">TAX001</td>
                                <td class="px-4 py-2 text-sm text-gray-700">13%增值税</td>
                                <td class="px-4 py-2 text-sm text-gray-700">一般纳税人增值税率</td>
                                <td class="px-4 py-2">
                                    <label class="switch">
                                        <input type="checkbox" checked>
                                        <span class="slider"></span>
                                    </label>
                                </td>
                                <td class="px-4 py-2 text-sm">
                                    <div class="flex space-x-2">
                                        <button class="text-primary hover:text-blue-700 edit-tax-rate">编辑</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4 py-2 text-sm text-gray-700">TAX002</td>
                                <td class="px-4 py-2 text-sm text-gray-700">9%增值税</td>
                                <td class="px-4 py-2 text-sm text-gray-700">建筑服务增值税率</td>
                                <td class="px-4 py-2">
                                    <label class="switch">
                                        <input type="checkbox" checked>
                                        <span class="slider"></span>
                                    </label>
                                </td>
                                <td class="px-4 py-2 text-sm">
                                    <div class="flex space-x-2">
                                        <button class="text-primary hover:text-blue-700 edit-tax-rate">编辑</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4 py-2 text-sm text-gray-700">TAX003</td>
                                <td class="px-4 py-2 text-sm text-gray-700">6%增值税</td>
                                <td class="px-4 py-2 text-sm text-gray-700">服务类增值税率</td>
                                <td class="px-4 py-2">
                                    <label class="switch">
                                        <input type="checkbox" checked>
                                        <span class="slider"></span>
                                    </label>
                                </td>
                                <td class="px-4 py-2 text-sm">
                                    <div class="flex space-x-2">
                                        <button class="text-primary hover:text-blue-700 edit-tax-rate">编辑</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4 py-2 text-sm text-gray-700">TAX004</td>
                                <td class="px-4 py-2 text-sm text-gray-700">3%增值税</td>
                                <td class="px-4 py-2 text-sm text-gray-700">小规模纳税人增值税率</td>
                                <td class="px-4 py-2">
                                    <label class="switch">
                                        <input type="checkbox" checked>
                                        <span class="slider"></span>
                                    </label>
                                </td>
                                <td class="px-4 py-2 text-sm">
                                    <div class="flex space-x-2">
                                        <button class="text-primary hover:text-blue-700 edit-tax-rate">编辑</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4 py-2 text-sm text-gray-700">TAX005</td>
                                <td class="px-4 py-2 text-sm text-gray-700">0%增值税</td>
                                <td class="px-4 py-2 text-sm text-gray-700">免税项目增值税率</td>
                                <td class="px-4 py-2">
                                    <label class="switch">
                                        <input type="checkbox">
                                        <span class="slider"></span>
                                    </label>
                                </td>
                                <td class="px-4 py-2 text-sm">
                                    <div class="flex space-x-2">
                                        <button class="text-primary hover:text-blue-700 edit-tax-rate">编辑</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页 -->
                <div class="mt-6 flex items-center justify-between">
                    <div class="text-sm text-gray-500">
                        显示 1 至 5 条，共 5 条
                    </div>
                    <div class="flex space-x-1">
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                            上一页
                        </button>
                        <button class="px-3 py-1 border border-primary bg-primary text-white rounded-md text-sm">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                            下一页
                        </button>
                    </div>
                </div>
        </main>
    </div>
    
    <!-- 新增/编辑税率抽屉 -->
    <div id="tax-rate-drawer" class="drawer fixed top-0 right-0 h-full w-[480px] bg-white shadow-lg z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="drawer-title" class="text-lg font-semibold text-gray-900">新增税率</h3>
                <button id="close-drawer" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="tax-rate-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">税率编码 <span class="text-red-500">*</span></label>
                        <input type="text" id="tax-rate-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#003eb3] focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">税率名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="tax-rate-name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#003eb3] focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">税率值 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <input type="number" id="tax-rate-value" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#003eb3] focus:border-transparent" min="0" max="100" step="0.01" required>
                            <span class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">%</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">说明</label>
                        <textarea id="tax-rate-desc" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#003eb3] focus:border-transparent" rows="3"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <div class="flex items-center">
                            <label class="switch">
                                <input type="checkbox" id="tax-rate-status" checked>
                                <span class="slider"></span>
                            </label>
                            <span class="ml-2 text-sm text-gray-700" id="status-text">启用</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 flex justify-end space-x-3">
                    <button type="button" id="cancel-btn" class="btn btn-outline px-4 py-2 rounded-md">取消</button>
                    <button type="submit" class="btn btn-primary px-4 py-2 rounded-md">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 抽屉遮罩 -->
    <div id="drawer-overlay" class="drawer-overlay fixed inset-0 bg-black bg-opacity-50 z-40"></div>
    
    <script>
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 等待DOM更新完成
                setTimeout(() => {
                    // 加载公共脚本
                    const script = document.createElement('script');
                    script.src = 'common/scripts.js';
                    script.onload = function() {
                        // 脚本加载完成后初始化
                        if (typeof initCommonFunctions === 'function') {
                            initCommonFunctions();
                        }
                    };
                    document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 初始化Lucide图标
        lucide.createIcons();
        
        // 加载侧边栏
        loadSidebar();
        

        
        // 抽屉功能
        const drawer = document.getElementById('tax-rate-drawer');
        const addBtn = document.getElementById('add-tax-rate');
        const closeBtn = document.getElementById('close-drawer');
        const cancelBtn = document.getElementById('cancel-btn');
        const statusToggle = document.getElementById('tax-rate-status');
        const statusText = document.getElementById('status-text');
        
        // 新增按钮点击事件
        addBtn.addEventListener('click', function() {
            document.getElementById('drawer-title').textContent = '新增税率';
            // 重置表单
            document.getElementById('tax-rate-form').reset();
            document.getElementById('tax-rate-status').checked = true;
            statusText.textContent = '启用';
            // 打开抽屉
            if (typeof openDrawer === 'function') {
                openDrawer(drawer);
            } else {
                drawer.classList.add('open');
                const drawerOverlay = document.getElementById('drawer-overlay');
                if (drawerOverlay) {
                    drawerOverlay.classList.add('open');
                }
            }
        });
        
        // 编辑按钮点击事件
        document.querySelectorAll('.edit-tax-rate').forEach(btn => {
            btn.addEventListener('click', function() {
                document.getElementById('drawer-title').textContent = '编辑税率';
                // 填充表单数据（模拟）
                document.getElementById('tax-rate-code').value = 'TAX001';
                document.getElementById('tax-rate-name').value = '13%增值税';
                document.getElementById('tax-rate-value').value = '13';
                document.getElementById('tax-rate-desc').value = '一般纳税人增值税率';
                document.getElementById('tax-rate-status').checked = true;
                statusText.textContent = '启用';
                // 打开抽屉
                if (typeof openDrawer === 'function') {
                    openDrawer(drawer);
                } else {
                    drawer.classList.add('open');
                    const drawerOverlay = document.getElementById('drawer-overlay');
                    if (drawerOverlay) {
                        drawerOverlay.classList.add('open');
                    }
                }
            });
        });
        
        // 关闭抽屉事件
        closeBtn.addEventListener('click', function() {
            if (typeof closeDrawer === 'function') {
                closeDrawer(drawer);
            } else {
                drawer.classList.remove('open');
                const drawerOverlay = document.getElementById('drawer-overlay');
                if (drawerOverlay) {
                    drawerOverlay.classList.remove('open');
                }
            }
        });
        
        cancelBtn.addEventListener('click', function() {
            if (typeof closeDrawer === 'function') {
                closeDrawer(drawer);
            } else {
                drawer.classList.remove('open');
                const drawerOverlay = document.getElementById('drawer-overlay');
                if (drawerOverlay) {
                    drawerOverlay.classList.remove('open');
                }
            }
        });
        
        document.getElementById('drawer-overlay').addEventListener('click', function() {
            if (typeof closeDrawer === 'function') {
                closeDrawer(drawer);
            } else {
                drawer.classList.remove('open');
                const drawerOverlay = document.getElementById('drawer-overlay');
                if (drawerOverlay) {
                    drawerOverlay.classList.remove('open');
                }
            }
        });
        
        // 状态切换文本更新
        statusToggle.addEventListener('change', function() {
            statusText.textContent = this.checked ? '启用' : '停用';
        });
        
        // 表单提交事件
        document.getElementById('tax-rate-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // 模拟提交
            alert('保存成功！');
            closeDrawer();
        });
        
        // 筛选条件选择器功能
        const filterSelect = document.getElementById('filter-select');
        const filterInput = document.getElementById('filter-input');

        filterSelect.addEventListener('change', function() {
            const selectedValue = this.value;
            
            // 根据选择的筛选条件更新占位符
            if (selectedValue === 'code') {
                filterInput.placeholder = '按税率编码搜索';
            } else if (selectedValue === 'name') {
                filterInput.placeholder = '按税率名称搜索';
            } else if (selectedValue === 'status') {
                filterInput.placeholder = '按状态搜索';
            }
            
            // 清空输入框
            filterInput.value = '';
        });

        // 高级筛选功能
        const advancedFilterBtn = document.getElementById('advanced-filter-btn');
        const advancedFilter = document.getElementById('advanced-filter');

        advancedFilterBtn.addEventListener('click', function() {
            advancedFilter.classList.toggle('hidden');
            
            // 切换按钮文本和图标
            if (!advancedFilter.classList.contains('hidden')) {
                this.innerHTML = '收起筛选 <i data-lucide="chevron-up" class="w-4 h-4 ml-1"></i>';
            } else {
                this.innerHTML = '高级筛选 <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>';
            }
            
            // 重新初始化图标
            lucide.createIcons();
        });
    </script>
</body>
</html>
