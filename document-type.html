<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单据类型 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <link rel="stylesheet" href="common/styles.css">
</head>
<body class="bg-neutral">
    <!-- 主容器 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-6 transition-all duration-300 h-full" id="main-content">
            <div class="h-full">
                <div class="bg-white rounded-lg shadow-sm p-6 h-full flex flex-col">
                    <div class="border-b border-gray-200 pb-4 mb-6">
                        <h1 class="text-xl font-semibold text-gray-800">单据类型管理</h1>
                    </div>
                    <!-- 筛选条件和按钮栏 -->
                    <div class="flex items-center justify-between mb-6 flex-nowrap">
                        <div class="flex items-center space-x-2 flex-1">
                            <select id="filter-field-document-type" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="code">单据类型编码</option>
                                <option value="name">单据类型名称</option>
                                <option value="document">单据</option>
                                <option value="status">状态</option>
                            </select>
                            <input type="text" id="filter-value-document-type" placeholder="按编码搜索" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                            </button>
                            <button id="advanced-filter-btn-document-type" class="px-3 py-2 text-primary hover:bg-secondary rounded-md transition-colors flex items-center">
                                高级筛选
                                <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>
                            </button>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button id="add-document-type" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                                新增
                            </button>
                        </div>
                    </div>
                    
                    <!-- 高级筛选展开区域 -->
                    <div id="advanced-filter-document-type" class="hidden bg-gray-50 p-4 rounded-md border border-gray-200 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">单据类型编码</label>
                                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">单据类型名称</label>
                                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">单据</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="">全部</option>
                                    <option value="receivable">应收单</option>
                                    <option value="sales-out">销售出库单</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="">全部</option>
                                    <option value="enabled">启用</option>
                                    <option value="disabled">停用</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-end space-x-2">
                            <button class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                                重置
                            </button>
                            <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                                查询
                            </button>
                        </div>
                    </div>
                    
                    <!-- 列表 -->
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">单据类型编码</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">单据类型名称</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">单据</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">是否默认</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">说明</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">DOC001</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">标准应收单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">应收单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">是</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">标准应收单类型</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-document-type">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">DOC002</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">定制应收单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">应收单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">否</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">定制应收单类型</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-document-type">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">DOC003</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">标准销售出库单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">销售出库单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">是</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">标准销售出库单类型</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-document-type">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 text-sm text-gray-700">DOC004</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">定制销售出库单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">销售出库单</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">否</td>
                                    <td class="px-4 py-2 text-sm text-gray-700">定制销售出库单类型</td>
                                    <td class="px-4 py-2">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-2 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700 edit-document-type">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="mt-auto flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            显示 1-4 条，共 4 条
                        </div>
                        <div class="flex space-x-1">
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                上一页
                            </button>
                            <button class="px-3 py-1 border border-primary bg-primary text-white rounded-md text-sm">1</button>
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                下一页
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑单据类型抽屉 -->
    <div id="document-type-drawer" class="drawer fixed top-0 right-0 h-full w-96 bg-white shadow-lg z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="drawer-title" class="text-lg font-semibold text-gray-900">新增单据类型</h3>
                <button id="close-drawer" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="document-type-form">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">单据类型编码 <span class="text-red-500">*</span></label>
                        <input type="text" id="document-type-code" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">单据类型名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="document-type-name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">单据 <span class="text-red-500">*</span></label>
                        <select id="document-type-category" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                            <option value="receivable">应收单</option>
                            <option value="sales-out">销售出库单</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">是否默认 <span class="text-red-500">*</span></label>
                        <div class="flex space-x-4">
                            <label class="flex items-center">
                                <input type="radio" name="is-default" value="yes" class="mr-2" checked>
                                <span>是</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="is-default" value="no" class="mr-2">
                                <span>否</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">说明</label>
                        <textarea id="document-type-description" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" rows="3"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <div class="flex items-center">
                            <label class="switch">
                                <input type="checkbox" id="document-type-status" checked>
                                <span class="slider"></span>
                            </label>
                            <span class="ml-2 text-sm text-gray-700" id="status-text">启用</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" id="cancel-btn" class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 抽屉遮罩层 -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <script>
        // 页面特定功能
        function initPageFunctions() {
            // 抽屉功能
            const addBtn = document.getElementById('add-document-type');
            const drawer = document.getElementById('document-type-drawer');
            const closeDrawerBtn = document.getElementById('close-drawer');
            const cancelBtn = document.getElementById('cancel-btn');
            const saveBtn = document.querySelector('button[type="submit"]');
            const drawerTitle = document.getElementById('drawer-title');
            
            // 表单字段
            const documentTypeCode = document.getElementById('document-type-code');
            const documentTypeName = document.getElementById('document-type-name');
            const documentTypeCategory = document.getElementById('document-type-category');
            const isDefaultYes = document.querySelector('input[name="is-default"][value="yes"]');
            const isDefaultNo = document.querySelector('input[name="is-default"][value="no"]');
            const documentTypeDescription = document.getElementById('document-type-description');
            const documentTypeStatus = document.getElementById('document-type-status');
            const statusText = document.getElementById('status-text');
            
            // 打开新增抽屉
            addBtn.addEventListener('click', () => {
                drawerTitle.textContent = '新增单据类型';
                // 重置表单
                documentTypeCode.value = '';
                documentTypeName.value = '';
                documentTypeCategory.value = 'receivable';
                isDefaultYes.checked = true;
                documentTypeDescription.value = '';
                documentTypeStatus.checked = true;
                statusText.textContent = '启用';
                
                // 打开抽屉
                if (typeof openDrawer === 'function') {
                    openDrawer(drawer);
                } else {
                    drawer.classList.add('open');
                    const drawerOverlay = document.getElementById('drawer-overlay');
                    if (drawerOverlay) {
                        drawerOverlay.classList.add('open');
                    }
                }
            });
            
            // 编辑按钮点击事件
            const editButtons = document.querySelectorAll('.edit-document-type');
            editButtons.forEach(button => {
                button.addEventListener('click', function() {
                    drawerTitle.textContent = '编辑单据类型';
                    // 模拟数据填充
                    documentTypeCode.value = 'DOC001';
                    documentTypeName.value = '标准应收单';
                    documentTypeCategory.value = 'receivable';
                    isDefaultYes.checked = true;
                    documentTypeDescription.value = '标准应收单类型';
                    documentTypeStatus.checked = true;
                    statusText.textContent = '启用';
                    
                    // 打开抽屉
                    if (typeof openDrawer === 'function') {
                        openDrawer(drawer);
                    } else {
                        drawer.classList.add('open');
                        const drawerOverlay = document.getElementById('drawer-overlay');
                        if (drawerOverlay) {
                            drawerOverlay.classList.add('open');
                        }
                    }
                });
            });
            
            // 关闭抽屉
            closeDrawerBtn.addEventListener('click', () => {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(drawer);
                } else {
                    drawer.classList.remove('open');
                    const drawerOverlay = document.getElementById('drawer-overlay');
                    if (drawerOverlay) {
                        drawerOverlay.classList.remove('open');
                    }
                }
            });
            
            cancelBtn.addEventListener('click', () => {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(drawer);
                } else {
                    drawer.classList.remove('open');
                    const drawerOverlay = document.getElementById('drawer-overlay');
                    if (drawerOverlay) {
                        drawerOverlay.classList.remove('open');
                    }
                }
            });
            
            // 保存按钮
            saveBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // 模拟保存操作
                alert('保存成功');
                if (typeof closeDrawer === 'function') {
                    closeDrawer(drawer);
                } else {
                    drawer.classList.remove('open');
                    const drawerOverlay = document.getElementById('drawer-overlay');
                    if (drawerOverlay) {
                        drawerOverlay.classList.remove('open');
                    }
                }
            });
            
            // 状态切换
            documentTypeStatus.addEventListener('change', function() {
                // 如果是默认单据类型，不能停用
                if (isDefaultYes.checked && !this.checked) {
                    alert('默认单据类型不能停用');
                    this.checked = true;
                    return;
                }
                statusText.textContent = this.checked ? '启用' : '停用';
            });
            
            // 是否默认切换
            isDefaultYes.addEventListener('change', function() {
                if (this.checked) {
                    // 如果设置为默认，自动启用
                    documentTypeStatus.checked = true;
                    statusText.textContent = '启用';
                }
            });
            
            // 筛选条件选择器功能
            const filterSelect = document.getElementById('filter-field-document-type');
            const filterInput = document.getElementById('filter-value-document-type');
            
            filterSelect.addEventListener('change', function() {
                const selectedValue = this.value;
                
                // 根据选择的筛选条件更新占位符
                if (selectedValue === 'code') {
                    filterInput.placeholder = '按单据类型编码搜索';
                } else if (selectedValue === 'name') {
                    filterInput.placeholder = '按单据类型名称搜索';
                } else if (selectedValue === 'document') {
                    filterInput.placeholder = '按单据搜索';
                } else if (selectedValue === 'status') {
                    filterInput.placeholder = '按状态搜索';
                }
                
                // 清空输入框
                filterInput.value = '';
            });
        }
        
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 等待DOM更新完成
                setTimeout(() => {
                    // 加载公共脚本
                    const script = document.createElement('script');
                    script.src = 'common/scripts.js';
                    script.onload = function() {
                        // 脚本加载完成后初始化
                        if (typeof initCommonFunctions === 'function') {
                            initCommonFunctions();
                        }
                        // 初始化页面特定功能
                        initPageFunctions();
                    };
                    document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 页面加载完成后加载侧边栏
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadSidebar);
        } else {
            loadSidebar();
        }
    </script>
</body>
</html>
