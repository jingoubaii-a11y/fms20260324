    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',

                    }
                }

        }

    <style>
        /* 中栏分类树 */
        .cat-group { border-bottom: 1px solid #f1f5f9; }
        .cat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; cursor: pointer; font-size: 14px; color: #334155;
            transition: background .15s;
        }
        .cat-header:hover { background: #f8fafc; }
        .cat-header .chev { width: 14px; height: 14px; color: #94a3b8; transition: transform .15s; margin-right: 8px; }
        .cat-group.open .chev { transform: rotate(90deg); }
        .cat-header .count { color: #94a3b8; font-size: 13px; }
        .cat-children { display: none; padding-bottom: 8px; }
        .cat-group.open .cat-children { display: block; }
        .cat-child {
            display: flex; align-items: center; gap: 8px;
            margin: 4px 12px; padding: 8px 12px;
            font-size: 13px; color: #475569; cursor: pointer; border-radius: 4px;
            border-left: 3px solid transparent;
        }
        .cat-child:hover { background: #f1f5f9; }
        .cat-child.active {
            background: #e6f0ff; color: #003eb3; font-weight: 600;
            border-left-color: #003eb3;
        }

        /* 工单卡片 */
        .ticket-card {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 6px;
            padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
            transition: all .15s;
        }
        .ticket-card:hover { border-color: #93c5fd; }
        .ticket-card.selected {
            border-color: #003eb3; box-shadow: 0 0 0 2px rgba(0,62,179,.12);
        }
        .ticket-card .title { font-size: 14px; font-weight: 600; color: #1f2937; }
        .ticket-card .field { font-size: 12.5px; color: #4b5563; margin-top: 4px; }
        .ticket-card .field .lbl { color: #6b7280; }
        .ticket-card .end-tag { color: #dc2626; font-size: 12px; font-weight: 500; }

        /* 详情 */
        .detail-title {
            font-size: 15px; font-weight: 600; color: #1f2937;
            padding: 16px 24px; border-bottom: 1px solid #e5e7eb; background: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .detail-tabs { display: flex; gap: 24px; padding: 0 24px; background: #fff; border-bottom: 1px solid #e5e7eb; }
        .detail-tab {
            padding: 12px 0; font-size: 14px; color: #6b7280; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all .15s;
        }
        .detail-tab.active { color: #003eb3; border-bottom-color: #003eb3; font-weight: 600; }

        .section-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; font-weight: 600; color: #1f2937;
            padding: 16px 24px 12px;
        }
        .section-label::before {
            content: ''; width: 3px; height: 14px; background: #003eb3; border-radius: 2px;
        }
        .export-btn-group { margin-left: auto; display: inline-flex; gap: 8px; }
        .export-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; font-size: 12px; font-weight: 500;
            color: #003eb3; background: #eff6ff; border: 1px solid #bfdbfe;
            border-radius: 4px; cursor: pointer; transition: all .15s;
        }
        .export-btn:hover { background: #003eb3; color: #fff; border-color: #003eb3; }

        .info-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px 32px; padding: 0 24px 20px;
        }
        .info-item { display: flex; align-items: baseline; font-size: 13px; }
        .info-item .lbl { color: #6b7280; margin-right: 4px; white-space: nowrap; }
        .info-item .val { color: #1f2937; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 状态标签 */
        .status-end { color: #dc2626; font-weight: 500; }

        /* 搜索栏 */
        .search-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 16px; border-bottom: 1px solid #f1f5f9; background: #fff;
        }
        .search-bar input {
            flex: 1; padding: 6px 12px; font-size: 13px;
            border: 1px solid #e5e7eb; border-radius: 4px;
            outline: none; transition: border-color .15s;
        }
        .search-bar input:focus { border-color: #003eb3; }
        .search-bar .refresh {
            padding: 6px; border: 1px solid #e5e7eb; border-radius: 4px;
            color: #6b7280; cursor: pointer;
        }
        .search-bar .refresh:hover { color: #003eb3; border-color: #003eb3; }

        /* 整装核算表格 */
        .dz-wrap { padding: 0 24px 20px; }
        .dz-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #e5e7eb; border-radius: 6px; }
        .dz-scroll + .dz-scroll { margin-top: 0; }
        .dz-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 12.5px; background: #fff; table-layout: auto; }
        .dz-table th, .dz-table td {
            border: 1px solid #e5e7eb; padding: 8px 10px; text-align: right;
            white-space: nowrap;
        }
        .dz-table th {
            background: #f8fafc; color: #475569; font-weight: 600; text-align: center;
        }
        .dz-table th.left, .dz-table td.left { text-align: left; }
        .dz-table th.center, .dz-table td.center { text-align: center; }
        .dz-table tbody tr:hover { background: #f8fafc; }
        .dz-table tr.summary-row { cursor: pointer; }
        .dz-table tr.summary-row:hover { background: #eff6ff; }
        .dz-table tr.total-row { background: #f1f5f9; font-weight: 600; color: #1f2937; }
        .dz-table tr.total-row td { border-color: #cbd5e1; }
        .dz-table .num { font-variant-numeric: tabular-nums; color: #1f2937; }
        .dz-table .pos { color: #059669; }
        .dz-table .neg { color: #dc2626; }
        .dz-table .drill-btn {
            color: #003eb3; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 2px;
        }
        .dz-table .drill-btn:hover { text-decoration: underline; }

        /* 双色分区表头(当月琥珀/累计天蓝) */
        .dz-table th.grp-month { background: #fef3c7; color: #92400e; }
        .dz-table th.grp-total { background: #dbeafe; color: #1e40af; }
        .dz-table td.col-month { background: #fffbeb; }
        .dz-table td.col-total { background: #eff6ff; }

        /* 明细面板 */
        .detail-drill {
            margin-top: 12px; border: 1px solid #dbeafe; border-radius: 6px;
            background: #f8fafc; padding: 12px; display: none;
        }
        .detail-drill.open { display: block; }
        .detail-drill-title {
            font-size: 13px; font-weight: 600; color: #1e40af;
            margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
        }
        .detail-drill-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #e5e7eb; border-radius: 6px; }
        .dz-table th, .dz-table td { white-space: nowrap; padding: 8px 10px; }
        .dz-table th.num, .dz-table td.num { min-width: 100px; }
        .dz-table th.left, .dz-table td.left { min-width: 120px; }

        /* 审批操作区 */
        .approve-area {
            border-top: 1px solid #e5e7eb; padding: 16px 24px; background: #fafafa;
        }
        .approve-area textarea {
            width: 100%; min-height: 60px; padding: 8px 12px; font-size: 13px;
            border: 1px solid #e5e7eb; border-radius: 4px; outline: none; resize: vertical;
        }
        .approve-area textarea:focus { border-color: #003eb3; }
        .approve-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-primary {
            padding: 6px 20px; background: #003eb3; color: #fff; border: none; border-radius: 4px;
            font-size: 13px; cursor: pointer;
        }
        .btn-primary:hover { background: #002d80; }
        .btn-danger {
            padding: 6px 20px; background: #fff; color: #dc2626; border: 1px solid #dc2626;
            border-radius: 4px; font-size: 13px; cursor: pointer;
        }
        .btn-danger:hover { background: #fef2f2; }
        .btn-default {
            padding: 6px 20px; background: #fff; color: #4b5563; border: 1px solid #d1d5db;
            border-radius: 4px; font-size: 13px; cursor: pointer;
        }
        .btn-default:hover { border-color: #003eb3; color: #003eb3; }
    </style>
</head>

            <div class="flex items-center gap-3">

                    <span class="text-sm text-gray-700">杨静</span>
                </div>
            </div>
        </header>

        <!-- 三栏工作区 -->
        <div class="flex-1 flex overflow-hidden">
            <!-- 左：分类树 -->
            <aside class="w-56 bg-white border-r border-gray-200 overflow-y-auto shrink-0" id="cat-panel"></aside>

            <!-- 中：搜索 + 工单列表 -->
            <section class="w-80 bg-neutral border-r border-gray-200 flex flex-col shrink-0">
                <div class="search-bar">
                    <input id="search-input" type="text" placeholder="请输入关键字搜索" />
                    <div class="refresh" title="刷新"><i data-lucide="refresh-cw" class="w-4 h-4"></i></div>
                </div>
                <div class="flex-1 overflow-y-auto p-3" id="ticket-list"></div>
            </section>

            <!-- 右：详情 -->
            <section class="flex-1 flex flex-col overflow-hidden bg-white" id="detail-panel">
                <div class="detail-title" id="detail-title">请从左侧选择一条工单</div>
                <div class="detail-tabs">
                    <div class="detail-tab active" data-dtab="info">审批信息</div>
                    <div class="detail-tab" data-dtab="log">审批日志</div>
                    <div class="detail-tab" data-dtab="flow">流程图</div>
                </div>
                <div class="flex-1 overflow-y-auto" id="detail-body"></div>
            </section>
        </div>
    </main>
</div>

/* ========== 分类树渲染 ========== */
function renderCategories() {
    const panel = document.getElementById('cat-panel');
    panel.innerHTML = categories.map(cat => {
        const open = cat.defaultOpen ? 'open' : '';
        const countHtml = cat.count !== null ? `<span class="count">${cat.count}</span>` : '';
        const childrenHtml = (cat.children || []).map(ch => `
            <div class="cat-child ${ch.active ? 'active' : ''}" data-catchild="${ch.key}">
                <i data-lucide="${ch.icon}" class="w-4 h-4"></i>
                <span>${ch.name}</span>
            </div>
        `).join('');
        return `
        <div class="cat-group ${open}" data-cat="${cat.key}">
            <div class="cat-header">
                <span class="flex items-center">
                    <i data-lucide="chevron-right" class="chev"></i>
                    <span>${cat.name}</span>
                </span>

        });

}

function bindExportButtons(t) {

        });

function csvEscape(v) {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
}

function downloadCSV(rows, filename) {
    const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
    // BOM 让 Excel 正确识别 UTF-8
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 100);
}

function tsStamp() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}

function exportSummaryCSV(t) {
    const entitySum = (k) => t.summaries.reduce((a, x) => a + (Number(x[k]) || 0), 0);
    const header = ['财务主体', '月份', '在建工地收入个数', '完工收入工地个数', '当月收入总金额', '当月成本总金额', '当月毛利总金额', '当月毛利率(%)'];
    const rows = [header];
    t.summaries.forEach(s => {
        const rate = s.revenue ? (s.gross / s.revenue) * 100 : null;
        rows.push([s.entity, t.period, s.buildCnt, s.doneCnt, s.revenue, s.cost, s.gross, rate === null ? '' : rate.toFixed(2)]);
    });
    const totRev = entitySum('revenue'), totGross = entitySum('gross');
    const totRate = totRev ? (totGross / totRev) * 100 : null;
    rows.push([`合计（${t.summaries.length} 家主体 · ${t.details.length} 个合同）`, '', entitySum('buildCnt'), entitySum('doneCnt'), totRev, entitySum('cost'), totGross, totRate === null ? '' : totRate.toFixed(2)]);
    downloadCSV(rows, `收入核算汇总_${t.billNo}_${tsStamp()}.csv`);
}

function exportDetailCSV(t) {
    const header = [
        '财务主体', '合同号', '合同名称', '需求类型', '预计总收入', '预计总成本',
        '当月完工百分比(%)', '当月收入金额', '当月成本金额', '当月毛利金额', '当月毛利率(%)',
        '累计完工百分比(%)', '累计收入金额', '累计成本金额', '累计毛利金额', '累计毛利率(%)'
    ];
    const rows = [header];
    t.details.forEach(d => {
        const mRate = d.mRev ? (d.mGross / d.mRev) * 100 : null;
        const tRate = d.tRev ? (d.tGross / d.tRev) * 100 : null;
        rows.push([
            d.entity, d.no, d.name, d.type, d.planRev, d.planCost,
            d.mPct, d.mRev, d.mCost, d.mGross, mRate === null ? '' : mRate.toFixed(2),
            d.tPct, d.tRev, d.tCost, d.tGross, tRate === null ? '' : tRate.toFixed(2)
        ]);
    });
    // 合计行
    const sum = k => t.details.reduce((a, x) => a + (Number(x[k]) || 0), 0);
    const sMRev = sum('mRev'), sMGross = sum('mGross');
    const sTRev = sum('tRev'), sTGross = sum('tGross');
    const mR = sMRev ? (sMGross / sMRev) * 100 : null;
    const tR = sTRev ? (sTGross / sTRev) * 100 : null;
    rows.push([
        `合计（${t.details.length} 个合同）`, '', '', '', sum('planRev'), sum('planCost'),
        '', sMRev, sum('mCost'), sMGross, mR === null ? '' : mR.toFixed(2),
        '', sTRev, sum('tCost'), sTGross, tR === null ? '' : tR.toFixed(2)
    ]);
    downloadCSV(rows, `合同粒度明细_${t.billNo}_${tsStamp()}.csv`);
}

            setTimeout(() => lucide.createIcons(), 60);
        });
}

/* ========== init ========== */
document.addEventListener('DOMContentLoaded', () => {
    loadSidebar();
    renderCategories();
    renderTicketList();
    renderDetail();
    lucide.createIcons();
});
</script>
</body>
