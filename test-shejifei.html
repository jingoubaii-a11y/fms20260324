<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计费核算测试页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f5f5] p-8">
    <h1 class="text-2xl font-bold mb-6">设计费核算模块 - 测试页面</h1>

    <!-- 直接显示设计费核算内容（无任何Tab切换） -->
    <div style="display: block !important; visibility: visible !important; opacity: 1 !important;">
        <div class="space-y-6">

            <!-- 设计费核算进度概览 -->
            <div class="bg-white rounded-lg shadow p-6 border border-[#e8e8e8]" style="display: block !important;">
                <h2 class="text-base font-bold text-[#003366] mb-4">设计费核算进度概览</h2>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="border border-[#d9d9d9] rounded-lg p-4 text-center">
                        <p class="text-xs text-[#666] mb-2">本期应核算项目</p>
                        <p class="text-3xl font-bold text-[#003366]">100<span class="text-sm ml-1">个</span></p>
                    </div>
                    <div class="border border-[#d9d9d9] rounded-lg p-4 text-center">
                        <p class="text-xs text-[#666] mb-2">设计费项目确认</p>
                        <p class="text-3xl font-bold text-primary">80<span class="text-sm ml-1">个</span></p>
                        <p class="text-xs text-primary mt-1">进度 80.0%</p>
                    </div>
                </div>

                <div>
                    <p class="text-xs text-[#333] mb-2">整体核算进度</p>
                    <div class="w-full bg-[#e8e8e8] rounded-full h-2">
                        <div class="bg-primary h-2 rounded-full" style="width: 80%"></div>
                    </div>
                </div>
            </div>

            <!-- 快捷核算步骤 -->
            <div class="bg-white rounded-lg shadow p-6 border border-[#e8e8e8]" style="display: block !important;">
                <h3 class="text-sm font-bold text-[#003366] mb-4">设计费核算步骤与快捷入口</h3>
                <button class="bg-[#1890ff] text-white px-4 py-2 rounded text-sm hover:bg-primary transition-colors">
                    设计费项目收入核算
                </button>
            </div>

            <!-- 明细页签区 -->
            <div class="bg-white rounded-lg shadow border border-[#e8e8e8]" style="display: block !important;">
                <div class="flex border-b border-[#e8e8e8] bg-[#fafafa]">
                    <div class="px-4 py-3 cursor-pointer text-sm font-medium text-primary bg-white border-t-2 border-t-primary border-x border-x-[#e8e8e8] -mb-[1px]">
                        本期单据生成详情
                    </div>
                    <div class="px-4 py-3 cursor-pointer text-sm font-medium text-[#666] hover:text-primary">
                        本期单据同步详情
                    </div>
                </div>

                <!-- 筛选条件区 -->
                <div class="p-4 bg-[#f8faff] border-b border-[#e8e8e8]" style="display: block !important;">
                    <div class="flex items-center gap-4 flex-wrap">
                        <div class="flex items-center gap-2">
                            <label class="text-xs text-[#333] font-medium">完成状态:</label>
                            <select class="border border-[#d9d9d9] rounded px-2 py-1 text-xs bg-white">
                                <option value="">全部</option>
                                <option value="1">已完成</option>
                                <option value="0">未完成</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs text-[#333] font-medium">合同号:</label>
                            <input type="text" placeholder="请输入合同号" class="border border-[#d9d9d9] rounded px-2 py-1 text-xs w-[200px]" />
                        </div>
                    </div>
                </div>

                <!-- 表格数据 -->
                <div class="overflow-x-auto" style="display: block !important;">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="bg-[#f0f2f5] text-[#333]">
                                <th class="p-2 border border-[#e8e8e8]">财务主体</th>
                                <th class="p-2 border border-[#e8e8e8]">合同号</th>
                                <th class="p-2 border border-[#e8e8e8]">设计费项目计算状态</th>
                                <th class="p-2 border border-[#e8e8e8]">设计费项目计算时间</th>
                                <th class="p-2 border border-[#e8e8e8]">设计费项目确认状态</th>
                                <th class="p-2 border border-[#e8e8e8]">设计费项目确认时间</th>
                                <th class="p-2 border border-[#e8e8e8] text-center w-[80px]">完成状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="hover:bg-[#f9fafc]">
                                <td class="p-2 border border-[#e8e8e8]">成都分公司</td>
                                <td class="p-2 border border-[#e8e8e8] text-[#1890ff] cursor-pointer">SJ901000001</td>
                                <td class="p-2 border border-[#e8e8e8]">已计算</td>
                                <td class="p-2 border border-[#e8e8e8] text-[#888]">2026-03-01 18:00:00</td>
                                <td class="p-2 border border-[#e8e8e8]">已确认</td>
                                <td class="p-2 border border-[#e8e8e8] text-[#888]">2026-03-01 20:00:00</td>
                                <td class="p-2 border border-[#e8e8e8] text-center">✅</td>
                            </tr>
                            <tr class="hover:bg-[#f9fafc]">
                                <td class="p-2 border border-[#e8e8e8]">成都分公司</td>
                                <td class="p-2 border border-[#e8e8e8] text-[#1890ff] cursor-pointer">SJ901000002</td>
                                <td class="p-2 border border-[#e8e8e8]">已计算</td>
                                <td class="p-2 border border-[#e8e8e8] text-[#888]">2026-03-01 18:00:00</td>
                                <td class="p-2 border border-[#e8e8e8]">未确认</td>
                                <td class="p-2 border border-[#e8e8e8] text-[#888]">-</td>
                                <td class="p-2 border border-[#e8e8e8] text-center">❌</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        console.log('✅ 测试页面加载成功！');
        console.log('如果您能看到这个消息和上面的内容，说明HTML/CSS没有问题');
        console.log('问题出在原页面的Tab切换逻辑上');
    </script>
</body>
</html>
