<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRD 全文 | 财务中台</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #003eb3;
            --primary-light: #e6f0ff;
            --border: #e5e7eb;
            --text: #1f2937;
            --muted: #6b7280;
            --sidebar-bg: #fafafa;
            --highlight: #fff2b3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
            color: var(--text);
            background: #fff;
        }

        .layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶栏 */
        .topbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: saturate(180%) blur(6px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
        }

        .topbar .title {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar .back-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            padding: 4px 10px;
            border: 1px solid var(--primary-light);
            border-radius: 4px;
            transition: background 0.15s;
        }

        .topbar .back-link:hover {
            background: var(--primary-light);
        }

        .topbar .crumbs {
            font-size: 13px;
            color: var(--muted);
        }

        .topbar .crumbs strong {
            color: var(--text);
        }

        /* 主体 */
        .main {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* 侧边目录 */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: var(--sidebar-bg);
            overflow-y: auto;
            padding: 18px 0;
            max-height: calc(100vh - 54px);
            position: sticky;
            top: 54px;
        }

        .sidebar-title {
            padding: 0 16px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-search {
            padding: 0 12px 12px;
        }

        .sidebar-search input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

        .sidebar-search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 62, 179, 0.12);
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .toc-item {
            padding: 5px 16px;
            font-size: 13px;
            color: #4b5563;
            cursor: pointer;
            border-left: 2px solid transparent;
            line-height: 1.4;
            word-break: break-all;
            user-select: none;
        }

        .toc-item:hover {
            background: var(--primary-light);
            color: var(--text);
        }

        .toc-item.active {
            background: var(--primary-light);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 500;
        }

        .toc-item.hide { display: none; }

        .toc-level-2 { font-weight: 500; padding-left: 16px; }
        .toc-level-3 { padding-left: 28px; font-size: 12.5px; color: var(--muted); }
        .toc-level-4 { padding-left: 40px; font-size: 12px; color: #9ca3af; }

        /* 内容 */
        .content {
            flex: 1;
            min-width: 0;
            padding: 24px 48px 80px;
            overflow-x: hidden;
        }

        .content-inner {
            max-width: 860px;
        }

        .md h1,
        .md h2,
        .md h3,
        .md h4,
        .md h5,
        .md h6 {
            color: #111827;
            margin: 28px 0 10px;
            font-weight: 600;
            line-height: 1.35;
            scroll-margin-top: 70px;
        }

        .md h1 { font-size: 26px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .md h2 { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .md h3 { font-size: 16px; color: var(--primary); }
        .md h4 { font-size: 14px; color: #4b5563; }

        .md p { line-height: 1.75; margin: 8px 0; }
        .md ul { padding-left: 22px; }
        .md li { margin: 3px 0; line-height: 1.7; }

        .md code {
            background: #f3f4f6;
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 12.5px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .md pre {
            background: #0b1020;
            color: #e5e7eb;
            padding: 14px 16px;
            border-radius: 6px;
            overflow-x: auto;
        }

        .md pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        .md blockquote {
            margin: 10px 0;
            padding: 6px 12px;
            border-left: 3px solid var(--primary);
            background: #f9fafb;
            color: var(--muted);
        }

        .md table {
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }

        .md th, .md td {
            border: 1px solid var(--border);
            padding: 6px 10px;
        }

        .md th { background: #f9fafb; }

        .md hr {
            border: 0;
            border-top: 1px dashed #d1d5db;
            margin: 18px 0;
        }

        /* 目标高亮：打开后自动定位到的章节 */
        .md .prd-target {
            animation: prdFlash 1.8s ease 0.2s;
            background: var(--highlight);
            padding: 4px 8px;
            border-radius: 4px;
        }

        @keyframes prdFlash {
            0%   { background: #ffcf33; }
            80%  { background: var(--highlight); }
            100% { background: transparent; padding: 0; }
        }

        /* 加载态 */
        .loading {
            color: var(--muted);
            padding: 40px 20px;
            text-align: center;
        }

        /* 小屏 */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content { padding: 16px 20px 60px; }
            .topbar .crumbs { display: none; }
        }

        /* ========== 顶部 Tab ========== */
        .view-tabs {
            display: flex;
            gap: 8px;
            padding: 0 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 54px;
            z-index: 19;
        }

        .view-tab {
            padding: 10px 14px;
            font-size: 13.5px;
            color: var(--muted);
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
        }

        .view-tab:hover { color: var(--text); }

        .view-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .view-tab .count {
            display: inline-block;
            margin-left: 4px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 10px;
        }

        .view-tab.active .count {
            background: var(--primary);
            color: #fff;
        }

        /* ========== 变更记录 pane ========== */
        .view-pane { display: none; }
        .view-pane.active { display: block; }

        /* 当前在 changelog tab 时，左侧目录与全文滚动联动失效，仍保留显示便于返回 */
        body.tab-changelog .sidebar { display: none; }
        body.tab-changelog .content { padding-left: 48px; }

        .changelog-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding: 10px 14px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
        }

        .changelog-toolbar label {
            color: var(--muted);
            margin-right: 2px;
        }

        .filter-chip {
            padding: 4px 10px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background: #fff;
            color: #4b5563;
            font-size: 12.5px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .filter-chip .chip-count {
            margin-left: 4px;
            opacity: 0.8;
        }

        .changelog-empty {
            color: var(--muted);
            padding: 40px 0;
            text-align: center;
            font-size: 13.5px;
        }

        .changelog-group {
            margin: 0 0 22px;
        }

        .changelog-group-title {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            padding: 6px 0;
            margin: 0 0 8px;
            border-bottom: 1px dashed var(--border);
        }

        .changelog-list {
            list-style: none;
            padding: 0;
            margin: 0;
            position: relative;
            padding-left: 18px;
        }

        .changelog-list::before {
            content: "";
            position: absolute;
            left: 5px;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: #e5e7eb;
        }

        .changelog-item {
            position: relative;
            padding: 0 0 12px 14px;
            margin-left: -18px;
            padding-left: 28px;
        }

        .changelog-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--primary);
        }

        .changelog-item.dim::before {
            border-color: #d1d5db;
        }

        .changelog-item.hit {
            background: #fffbe6;
            border-radius: 4px;
            padding: 4px 8px 10px 28px;
            margin-left: -18px;
        }

        .changelog-scope {
            display: inline-block;
            font-size: 11px;
            padding: 1px 7px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 10px;
            margin-right: 6px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .changelog-scope:hover { opacity: 0.75; }

        .changelog-scope.scope-mine {
            background: #ffedd5;
            color: #c2410c;
        }

        .changelog-summary {
            display: inline;
            color: #374151;
            font-size: 13.5px;
            line-height: 1.65;
        }

        .changelog-summary code {
            background: #f3f4f6;
            color: var(--primary);
            padding: 0 5px;
            border-radius: 3px;
            font-size: 12.5px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="topbar">
            <div class="title">
                <span>📘 PRD 全文</span>
                <span class="crumbs" id="crumbs">加载中...</span>
            </div>
            <a href="javascript:history.length>1?history.back():null" class="back-link">← 返回原型页</a>
        </div>
        <div class="view-tabs" role="tablist">
            <button class="view-tab active" data-view="prd" role="tab">需求描述</button>
            <button class="view-tab" data-view="changelog" role="tab">变更记录<span class="count" id="cl-count">0</span></button>
        </div>
        <div class="main">
            <aside class="sidebar" aria-label="目录">
                <div class="sidebar-title">目录</div>
                <div class="sidebar-search">
                    <input type="text" id="toc-search" placeholder="过滤目录..." />
                </div>
                <ul class="toc-list" id="toc"></ul>
          </aside>
            <main class="content">
                <div class="view-pane active" data-view="prd">
                    <div class="content-inner md" id="md-body">
                        <div class="loading">正在加载 prd.md ...</div>
                    </div>
                </div>
                <div class="view-pane" data-view="changelog">
                    <div class="content-inner">
                        <div class="changelog-toolbar" id="cl-toolbar">
                            <label>筛选范围：</label>
                            <button class="filter-chip" data-scope="mine">仅本页</button>
                            <button class="filter-chip" data-scope="module">本模块</button>
                            <button class="filter-chip active" data-scope="all">全部变更</button>
                            <span style="margin-left:auto;color:var(--muted);font-size:12px" id="cl-summary"></span>
                        </div>
                        <div id="changelog-body">
                            <div class="loading">正在加载变更记录...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        var ROOT = '../'; // 相对 common/prd-full.html 所在位置
        var PRD_URL = ROOT + 'PRD/prd.md';
        var CHANGELOG_URL = ROOT + 'PRD/CHANGELOG.md';
        var JSON_URL = 'prd-sections.json';

        // 当前上下文（由 URL 解析）
        var ctx = { pageKey: null, module: null, section: null, moduleSlug: null, sectionSlug: null };

        // ---------- 工具 ----------
        function slugify(text, seen) {
            var base = String(text).trim().replace(/\s+/g, '-').replace(/[^\w\-\u4e00-\u9fa5]+/g, '');
            if (!base) base = 'section';
            if (!seen) return base;
            var slug = base, i = 2;
            while (seen[slug]) slug = base + '-' + i++;
            seen[slug] = true;
            return slug;
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '\u0026amp;')
                .replace(/</g, '\u0026lt;')
                .replace(/>/g, '\u0026gt;')
                .replace(/"/g, '\u0026quot;')
                .replace(/'/g, '\u0026#39;');
        }

        function renderInline(text) {
            return escapeHtml(text).replace(/`([^`]+)`/g, function (_m, c) { return '<code>' + c + '</code>'; });
        }

        function query() {
            var q = {};
            var s = (location.search || '').replace(/^\?/, '');
            if (!s) return q;
            s.split('\u0026').forEach(function (kv) {
                var p = kv.split('=');
                q[decodeURIComponent(p[0])] = decodeURIComponent((p[1] || '').replace(/\+/g, ' '));
            });
            return q;
        }

        // ---------- PRD（需求描述） ----------
        function postProcessHeadings(container) {
            var seen = {};
            var headings = container.querySelectorAll('h1, h2, h3, h4, h5, h6');
            headings.forEach(function (h) {
                h.id = slugify(h.textContent, seen);
            });
            return headings;
        }

        function renderTOC(headings) {
            var toc = document.getElementById('toc');
            var frag = document.createDocumentFragment();
            headings.forEach(function (h) {
                var lvl = parseInt(h.tagName.substring(1), 10);
                if (lvl < 2 || lvl > 4) return;
                var li = document.createElement('li');
                li.className = 'toc-item toc-level-' + lvl;
                li.textContent = h.textContent;
                li.setAttribute('data-target', h.id);
                li.addEventListener('click', function () {
                    var el = document.getElementById(h.id);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                frag.appendChild(li);
            });
            toc.appendChild(frag);
        }

        function syncActiveTOC() {
            if (document.body.classList.contains('tab-changelog')) return;
            var items = document.querySelectorAll('.toc-item');
            if (!items.length) return;
            var best = null;
            items.forEach(function (it) {
                var target = document.getElementById(it.getAttribute('data-target'));
                if (!target) return;
                var top = target.getBoundingClientRect().top;
                if (top - 80 <= 0) best = it;
            });
            items.forEach(function (x) { x.classList.remove('active'); });
            if (best) best.classList.add('active');
        }

        function highlightTarget(targetId) {
            if (!targetId) return;
            var el = document.getElementById(targetId);
            if (!el) return;
            setTimeout(function () {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                el.classList.add('prd-target');
                setTimeout(function () { el.classList.remove('prd-target'); }, 2400);
            }, 50);
        }

        function setCrumbs(text) {
            document.getElementById('crumbs').innerHTML = text;
        }

        // ---------- CHANGELOG 解析 ----------
        // 输入文本 -> [{date, tag, module, section, summary}]，按文档顺序（最新在前）
        function parseChangelog(text) {
            var lines = text.split(/\r?\n/);
            var out = [];
            var curDate = null;
            var dateRe = /^##\s+(\d{4}-\d{2}-\d{2})\s*$/;
            var itemRe = /^-\s*\[([^\]]+)\]\s*(.+)$/;
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].replace(/\s+$/, '');
                var dm = dateRe.exec(line);
                if (dm) { curDate = dm[1]; continue; }
                if (!curDate) continue;
                var im = itemRe.exec(line.replace(/^\s+/, ''));
                if (im) {
                    var tag = im[1].trim();
                    var module = tag, section = null;
                    if (tag.indexOf('/') !== -1) {
                        var parts = tag.split('/');
                        module = parts[0].trim();
                        section = parts.slice(1).join('/').trim();
                    }
                    out.push({ date: curDate, tag: tag, module: module, section: section, summary: im[2].trim() });
                }
            }
            return out;
        }

        function filterChangelog(entries, scope) {
            if (scope === 'all') return entries.slice();
            if (scope === 'module') {
                if (!ctx.module) return entries.slice();
                return entries.filter(function (e) { return e.module === ctx.module; });
            }
            // mine: 当前页面对应章节
            if (!ctx.module) return entries.slice();
            return entries.filter(function (e) {
                if (e.module !== ctx.module) return false;
                if (!ctx.section) return true; // 模块级页面：模块下所有变更都算
                // 子章节级：精确匹配子章节，或模块级整体改动
                return !e.section || e.section === ctx.section;
            });
        }

        function renderChangelog(entries) {
            var body = document.getElementById('changelog-body');
            if (!entries.length) {
                body.innerHTML = '<div class="changelog-empty">暂无符合条件的变更记录</div>';
                return;
            }
            // 按日期分组
            var groups = {};
            var order = [];
            entries.forEach(function (e) {
                if (!groups[e.date]) { groups[e.date] = []; order.push(e.date); }
                groups[e.date].push(e);
            });
            var html = '';
            order.forEach(function (date) {
                html += '<div class="changelog-group">';
                html += '<div class="changelog-group-title">' + escapeHtml(date) + '</div>';
                html += '<ul class="changelog-list">';
                groups[date].forEach(function (e, idx) {
                    var isMine = ctx.module === e.module && (!ctx.section || !e.section || e.section === ctx.section);
                    var dim = !isMine ? ' dim' : '';
                    var hit = ''; // 不同 scope 下视觉区分由 chip 控制即可
                    var scopeCls = isMine ? 'changelog-scope scope-mine' : 'changelog-scope';
                    html += '<li class="changelog-item' + dim + hit + '">';
                    html += '<span class="' + scopeCls + '" data-module="' + escapeHtml(e.module) + '"' +
                            (e.section ? ' data-section="' + escapeHtml(e.section) + '"' : '') +
                            ' title="点击在 PRD 中定位">' + escapeHtml(e.tag) + '</span>';
                    html += '<span class="changelog-summary">' + renderInline(e.summary) + '</span>';
                    html += '</li>';
                });
                html += '</ul></div>';
            });
            body.innerHTML = html;

            // 标签点击 -> 切回 PRD Tab 并跳转锚点
            body.querySelectorAll('.changelog-scope').forEach(function (s) {
                s.addEventListener('click', function () {
                    var sec = s.getAttribute('data-section');
                    var mod = s.getAttribute('data-module');
                    var slug = sec ? slugify(sec) : (mod ? slugify(mod) : null);
                    if (!slug) return;
                    switchView('prd');
                    setTimeout(function () { highlightTarget(slug); }, 50);
                });
            });
        }

        function updateChangelogSummary(filteredCount, total) {
            var el = document.getElementById('cl-summary');
            if (filteredCount === total) {
                el.textContent = '共 ' + total + ' 条';
            } else {
                el.textContent = '已筛选 ' + filteredCount + ' / 共 ' + total + ' 条';
            }
        }

        // ---------- Tab 切换 ----------
        function switchView(name) {
            document.querySelectorAll('.view-tab').forEach(function (t) {
                t.classList.toggle('active', t.getAttribute('data-view') === name);
            });
            document.querySelectorAll('.view-pane').forEach(function (p) {
                p.classList.toggle('active', p.getAttribute('data-view') === name);
            });
            document.body.classList.toggle('tab-changelog', name === 'changelog');
            // 切换时回滚到顶部，避免 PRD 长滚动位置混在 changelog 上
            if (name === 'changelog') window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
        }

        document.querySelectorAll('.view-tab').forEach(function (tab) {
            tab.addEventListener('click', function () { switchView(tab.getAttribute('data-view')); });
        });

        // 目录过滤
        document.getElementById('toc-search').addEventListener('input', function (e) {
            var q = e.target.value.trim().toLowerCase();
            document.querySelectorAll('.toc-item').forEach(function (it) {
                var match = !q || it.textContent.toLowerCase().indexOf(q) !== -1;
                it.classList.toggle('hide', !match);
            });
        });

        // ---------- 启动 ----------
        Promise.all([
            fetch(PRD_URL, { cache: 'no-cache' }).then(function (r) { return r.text(); }),
            fetch(JSON_URL, { cache: 'no-cache' }).then(function (r) { return r.ok ? r.json() : { sections: {} }; }).catch(function () { return { sections: {} }; }),
            fetch(CHANGELOG_URL, { cache: 'no-cache' }).then(function (r) { return r.ok ? r.text() : ''; }).catch(function () { return ''; })
        ]).then(function (arr) {
            var md = arr[0];
            var sectionsData = (arr[1] && arr[1].sections) || {};
            var changelogText = arr[2] || '';

            // ---- 渲染 PRD ----
            if (window.marked && window.marked.parse) {
                if (window.marked.setOptions) window.marked.setOptions({ gfm: true, breaks: false });
                document.getElementById('md-body').innerHTML = window.marked.parse(md);
            } else {
                var pre = document.createElement('pre');
                pre.textContent = md;
                var body = document.getElementById('md-body');
          body.innerHTML = '';
                body.appendChild(pre);
            }
            var headings = postProcessHeadings(document.getElementById('md-body'));
            renderTOC(headings);

            // ---- 解析 URL 上下文 ----
            var q = query();
            var pageKey = q.page;
            var mod = q.module;
            var sec = q.section;
            var targetSlug = null;
            if (pageKey && sectionsData[pageKey]) {
                var d = sectionsData[pageKey];
                ctx.pageKey = pageKey;
                ctx.module = d.module;
                ctx.section = d.section;
                ctx.moduleSlug = d.moduleSlug;
                ctx.sectionSlug = d.sectionSlug;
                targetSlug = d.sectionSlug || d.moduleSlug || null;
                setCrumbs('来自页面 <strong>' + escapeHtml(pageKey) + '</strong>' +
                    (d.module ? '｜' + escapeHtml(d.module) : '') +
                    (d.section ? ' / ' + escapeHtml(d.section) : ''));
            } else if (sec || mod) {
                ctx.module = mod || null;
                ctx.section = sec || null;
                targetSlug = sec ? slugify(sec) : (mod ? slugify(mod) : null);
                if (sec) setCrumbs('定位章节 <strong>' + escapeHtml(sec) + '</strong>' + (mod ? '（模块：' + escapeHtml(mod) + '）' : ''));
                else setCrumbs('定位模块 <strong>' + escapeHtml(mod) + '</strong>');
            } else if (location.hash) {
                targetSlug = decodeURIComponent(location.hash.substring(1));
                setCrumbs('锚点 <strong>#' + escapeHtml(targetSlug) + '</strong>');
            } else {
                setCrumbs('浏览完整 prd.md');
            }
            highlightTarget(targetSlug);
            window.addEventListener('scroll', syncActiveTOC, { passive: true });
            syncActiveTOC();

            // ---- 渲染 Changelog ----
            var allEntries = parseChangelog(changelogText);
            document.getElementById('cl-count').textContent = allEntries.length;

            // 默认 scope：有上下文则 mine，否则 all
            var defaultScope = ctx.module ? 'mine' : 'all';
            var chips = document.querySelectorAll('.filter-chip');
            chips.forEach(function (c) {
                c.classList.toggle('active', c.getAttribute('data-scope') === defaultScope);
                // 若没有上下文，禁用 mine/module
                if (!ctx.module && (c.getAttribute('data-scope') === 'mine' || c.getAttribute('data-scope') === 'module')) {
                    c.disabled = true;
                    c.style.opacity = '0.45';
                    c.style.cursor = 'not-allowed';
                    c.title = '当前未关联具体页面，仅可查看全部';
                }
                c.addEventListener('click', function () {
                    if (c.disabled) return;
                    chips.forEach(function (x) { x.classList.remove('active'); });
                    c.classList.add('active');
                    var entries = filterChangelog(allEntries, c.getAttribute('data-scope'));
                    renderChangelog(entries);
                    updateChangelogSummary(entries.length, allEntries.length);
                });
            });
            var initial = filterChangelog(allEntries, defaultScope);
            renderChangelog(initial);
            updateChangelogSummary(initial.length, allEntries.length);

            // 初始 Tab：?tab=changelog 直达
            if (q.tab === 'changelog') switchView('changelog');
        }).catch(function (err) {
            document.getElementById('md-body').innerHTML =
                '<div class="loading">加载失败：' + (err && err.message ? err.message : err) + '</div>';
        });
    })();
    </script>
</body>
</html>
