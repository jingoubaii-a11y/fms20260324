<!-- 软装项目核算新增任务抽屉（公共组件） -->
<!-- 抽屉遮罩层 -->
<div id="soft-project-task-overlay" class="drawer-overlay" onclick="closeSoftProjectTaskDrawer()"></div>
<!-- 抽屉面板 -->
<div id="soft-project-task-drawer" class="fixed top-0 right-0 h-full w-[480px] bg-white shadow-2xl z-50 drawer overflow-y-auto">
    <!-- 抽屉头部 -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#e8e8e8] bg-[#fafafa]">
        <h3 class="text-[16px] font-bold text-[#003366]">新增软装项目核算任务</h3>
        <button id="close-soft-task-drawer" class="text-[#999] hover:text-[#333] text-[20px] leading-none cursor-pointer">&times;</button>
    </div>
    <!-- 抽屉内容 -->
    <div class="px-6 py-5 space-y-5">
        <!-- 项目类型 -->
        <div>
            <label class="text-[13px] text-[#333] font-medium mb-2 block">项目类型 <span class="text-[#ff4d4f]">*</span></label>
            <div class="flex items-center space-x-2">
                <input type="text" value="软装" readonly class="flex-1 border border-[#d9d9d9] rounded px-3 py-2 text-[13px] bg-[#f5f5f5] text-[#333] cursor-not-allowed" />
                <span class="text-[12px] text-[#999]">锁定</span>
            </div>
        </div>
        <!-- 核算方法 -->
        <div>
            <label class="text-[13px] text-[#333] font-medium mb-2 block">核算方法 <span class="text-[#ff4d4f]">*</span></label>
            <div class="flex items-center space-x-2">
                <input type="text" value="完成合同法" readonly class="flex-1 border border-[#d9d9d9] rounded px-3 py-2 text-[13px] bg-[#f5f5f5] text-[#333] cursor-not-allowed" />
                <span class="text-[12px] text-[#999]">锁定</span>
            </div>
        </div>
        <!-- 财务组织 -->
        <div>
            <label class="text-[13px] text-[#333] font-medium mb-2 block">财务组织 <span class="text-[#ff4d4f]">*</span></label>
            <div class="relative">
                <div id="soft-task-entity-tags" class="flex flex-wrap gap-2 p-2 border border-[#d9d9d9] rounded min-h-[36px] cursor-pointer bg-white"></div>
                <div id="soft-task-entity-dropdown" class="hidden absolute z-10 top-full left-0 right-0 bg-white border border-[#d9d9d9] rounded shadow-lg max-h-60 overflow-y-auto mt-1">
                    <div class="p-2">
                        <div class="flex items-center p-2 hover:bg-[#f5f5f5] cursor-pointer" data-value="all">
                            <input type="checkbox" class="mr-2" id="soft-entity-all"><label for="soft-entity-all">全选</label>
                        </div>
                        <div class="flex items-center p-2 hover:bg-[#f5f5f5] cursor-pointer" data-value="cdgf">
                            <input type="checkbox" class="mr-2" id="soft-entity-cdgf"><label for="soft-entity-cdgf">成都分公司</label>
                        </div>
                        <div class="flex items-center p-2 hover:bg-[#f5f5f5] cursor-pointer" data-value="bjgf">
                            <input type="checkbox" class="mr-2" id="soft-entity-bjgf"><label for="soft-entity-bjgf">北京分公司</label>
                        </div>
                        <div class="flex items-center p-2 hover:bg-[#f5f5f5] cursor-pointer" data-value="shgf">
                            <input type="checkbox" class="mr-2" id="soft-entity-shgf"><label for="soft-entity-shgf">上海分公司</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 核算期间 -->
        <div>
            <label class="text-[13px] text-[#333] font-medium mb-2 block">核算期间 <span class="text-[#ff4d4f]">*</span></label>
            <div class="flex items-center space-x-2">
                <input type="text" value="2026-04" readonly class="flex-1 border border-[#d9d9d9] rounded px-3 py-2 text-[13px] bg-[#f5f5f5] text-[#333] cursor-not-allowed" />
                <span class="text-[12px] text-[#999]">锁定</span>
            </div>
        </div>
        <!-- 合同号 -->
        <div>
            <label class="text-[13px] text-[#333] font-medium mb-2 block">合同号</label>
            <input type="text" placeholder="输入后下拉多选，不填默认无合同过滤" class="w-full border border-[#d9d9d9] rounded px-3 py-2 text-[13px] outline-none focus:border-[#0055ff]" id="soft-task-contract" />
        </div>
        <!-- 重算选项 -->
        <div class="border border-[#e8e8e8] rounded p-4 space-y-3 bg-[#fafafa]">
            <div class="text-[13px] font-medium text-[#333] mb-1">重算选项</div>
            <!-- 是否重算已计算未确认的合同 -->
            <label class="flex items-start space-x-2 cursor-pointer">
                <input type="checkbox" class="mt-1 cursor-pointer" id="soft-recalc-calculated" />
                <span class="text-[12px] text-[#333] leading-5">是否重算已计算未确认的合同</span>
            </label>
            <!-- 是否重算已确认的合同 -->
            <label class="flex items-start space-x-2 cursor-pointer">
                <input type="checkbox" class="mt-1 cursor-pointer" id="soft-recalc-confirmed" />
                <span class="text-[12px] text-[#333] leading-5">是否重算已确认的合同</span>
            </label>
            <!-- 是否重算已确认的合同（仅未完全获取材料成本合同） -->
            <label class="flex items-start space-x-2 cursor-pointer">
                <input type="checkbox" class="mt-1 cursor-pointer" id="soft-recalc-confirmed-partial" />
                <span class="text-[12px] text-[#333] leading-5">是否重算已确认的合同（仅未完全获取材料成本合同）</span>
            </label>
            <div class="text-[11px] text-[#999] mt-2 leading-4">以上选项均未勾选时，仅核算满足条件的增量合同；勾选后取对应条件的并集</div>
        </div>
    </div>
    <!-- 抽屉底部 -->
    <div class="flex justify-end space-x-3 px-6 py-4 border-t border-[#e8e8e8] bg-[#fafafa] sticky bottom-0">
        <button id="cancel-soft-task-btn" class="px-4 py-2 border border-[#d9d9d9] rounded text-[14px] text-[#666] hover:border-[#0055ff] hover:text-[#0055ff] cursor-pointer transition-colors">取消</button>
        <button id="confirm-soft-task-btn" class="px-4 py-2 bg-[#0055ff] text-white rounded text-[14px] hover:bg-[#003399] cursor-pointer transition-colors">确认</button>
    </div>
</div>
