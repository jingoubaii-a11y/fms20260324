<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>来源系统 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: {
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                    },
                },
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            transition: width 0.3s ease-in-out;
            overflow-y: auto;
            height: 100vh;
        }
        
        .sidebar.collapsed {
            width: 64px;
        }
        
        .sidebar.collapsed .sidebar-text {
            display: none;
        }
        
        .sidebar.collapsed .sidebar-icon {
            margin: 0 auto;
        }
        
        .sidebar-item {
            transition: all 0.2s ease-in-out;
            font-size: 0.875rem;
        }
        
        .sidebar-item:hover {
            background-color: rgba(0, 62, 179, 0.1);
        }
        
        .sidebar-item.active {
            background-color: #e6f0ff;
            color: #003eb3;
            font-weight: 500;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #003eb3 0%, #0056c7 100%);
        }
        
        .menu-header h2 {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        
        .drawer.open {
            transform: translateX(0);
        }
        
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 15;
            display: none;
        }
        
        .drawer-overlay.open {
            display: block;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #003eb3;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body class="bg-neutral">
    <!-- 主容器 -->
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-6 transition-all duration-300 overflow-y-auto" id="main-content">
            <div class="h-full flex flex-col">
                <div class="bg-white rounded-lg shadow-sm p-6 flex-1">
                    <div class="border-b border-gray-200 pb-4 mb-6">
                        <h1 class="text-xl font-semibold text-gray-800">来源系统</h1>
                        <p class="text-gray-600 mt-1">标识数据来源平台，用于数据溯源、接口区分、业务链路追踪</p>
                    </div>
                    
                    <!-- 搜索条件和按钮 -->
                    <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex-1 flex items-center space-x-2">
                            <!-- 筛选条件选择器 -->
                            <select id="filter-select" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none text-sm">
                                <option value="code">来源系统编码</option>
                                <option value="name">来源系统名称</option>
                                <option value="status">状态</option>
                            </select>
                            
                            <!-- 输入框 -->
                            <input type="text" id="filter-input" placeholder="按来源系统编码搜索" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            
                            <!-- 搜索按钮 -->
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                            
                            <!-- 刷新按钮 -->
                            <button class="px-3 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors">
                                <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                            </button>
                            
                            <!-- 高级筛选按钮 -->
                            <button id="advanced-filter-btn" class="px-3 py-2 text-primary hover:bg-secondary rounded-md transition-colors flex items-center">
                                高级筛选
                                <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>
                            </button>
                        </div>
                        
                        <!-- 按钮组 -->
                        <div class="flex space-x-3">
                            <button id="add-btn" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                                新增
                            </button>
                        </div>
                    </div>
                    
                    <!-- 高级筛选条件 -->
                    <div id="advanced-filter" class="mb-6 grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">来源系统编码</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">来源系统名称</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                            <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">全部</option>
                                <option value="enabled">启用</option>
                                <option value="disabled">停用</option>
                            </select>
                        </div>
                        <div class="md:col-span-3 flex justify-end space-x-2">
                            <button class="px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                                重置
                            </button>
                            <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                                查询
                            </button>
                        </div>
                    </div>
                    
                    <!-- 列表 -->
                    <div class="overflow-x-auto mb-6 flex-1">
                        <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">来源系统编码</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">来源系统名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">说明</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="px-4 py-3 text-sm text-gray-700">SYS001</td>
                                    <td class="px-4 py-3 text-sm text-gray-700">SVI</td>
                                    <td class="px-4 py-3 text-sm text-gray-700">销售系统</td>
                                    <td class="px-4 py-3">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-3 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700" onclick="editSourceSystem('SYS001')">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="px-4 py-3 text-sm text-gray-700">SYS002</td>
                                    <td class="px-4 py-3 text-sm text-gray-700">积木云装</td>
                                    <td class="px-4 py-3 text-sm text-gray-700">装修管理系统</td>
                                    <td class="px-4 py-3">
                                        <label class="switch">
                                            <input type="checkbox" checked>
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-3 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700" onclick="editSourceSystem('SYS002')">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="px-4 py-3 text-sm text-gray-700">SYS003</td>
                                    <td class="px-4 py-3 text-sm text-gray-700">WMS</td>
                                    <td class="px-4 py-3 text-sm text-gray-700">仓库管理系统</td>
                                    <td class="px-4 py-3">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="px-4 py-3 text-sm">
                                        <div class="flex space-x-2">
                                            <button class="text-primary hover:text-blue-700" onclick="editSourceSystem('SYS003')">编辑</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="mt-auto flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            显示 1-3 条，共 3 条
                        </div>
                        <div class="flex space-x-1">
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>
                                上一页
                            </button>
                            <button class="px-3 py-1 border border-primary bg-primary text-white rounded-md text-sm">1</button>
                            <button class="px-3 py-1 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 disabled:opacity-50" disabled>
                                下一页
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 抽屉遮罩层 -->
    <div class="drawer-overlay" id="drawer-overlay"></div>

    <!-- 新增/编辑来源系统抽屉 -->
    <div id="source-system-drawer" class="drawer fixed top-0 right-0 h-full w-[480px] bg-white shadow-lg z-20 p-6 overflow-y-auto">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-semibold text-gray-800" id="source-system-drawer-title">新增来源系统</h3>
            <button id="close-source-system-drawer" class="p-2 rounded-md hover:bg-gray-100">
                <i data-lucide="x"></i>
            </button>
        </div>
        <form>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">来源系统编码 <span class="text-accent">*</span></label>
                    <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" id="source-system-code" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">来源系统名称 <span class="text-accent">*</span></label>
                    <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" id="source-system-name" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">说明</label>
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" rows="3" id="source-system-description"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                    <label class="switch">
                        <input type="checkbox" checked id="source-system-status">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">创建人</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">修改人</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">修改时间</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50" disabled>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex space-x-3">
                <button type="button" id="cancel-source-system-btn" class="flex-1 px-4 py-2 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                    关闭
                </button>
                <button type="button" id="save-source-system-btn" class="flex-1 px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 transition-colors">
                    保存
                </button>
            </div>
        </form>
    </div>

    <script>
        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                
                // 等待DOM更新完成
                setTimeout(() => {
                    // 加载公共脚本
                    const script = document.createElement('script');
                    script.src = 'common/scripts.js';
                    script.onload = function() {
                        // 脚本加载完成后初始化
                        if (typeof initCommonFunctions === 'function') {
                            initCommonFunctions();
                        }
                        // 初始化页面特定功能
                        initPageFunctions();
                    };
                    document.body.appendChild(script);
                }, 100);
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }
        
        // 初始化页面特定功能
        function initPageFunctions() {
            // 筛选条件选择器功能
            const filterSelect = document.getElementById('filter-select');
            const filterInput = document.getElementById('filter-input');

            filterSelect.addEventListener('change', function() {
                const selectedValue = this.value;
                
                // 根据选择的筛选条件更新占位符
                if (selectedValue === 'code') {
                    filterInput.placeholder = '按来源系统编码搜索';
                } else if (selectedValue === 'name') {
                    filterInput.placeholder = '按来源系统名称搜索';
                } else if (selectedValue === 'status') {
                    filterInput.placeholder = '按状态搜索';
                }
                
                // 清空输入框
                filterInput.value = '';
            });

            // 高级筛选功能
            const advancedFilterBtn = document.getElementById('advanced-filter-btn');
            const advancedFilter = document.getElementById('advanced-filter');

            advancedFilterBtn.addEventListener('click', function() {
                advancedFilter.classList.toggle('hidden');
                
                // 切换按钮文本和图标
                if (!advancedFilter.classList.contains('hidden')) {
                    this.innerHTML = '收起筛选 <i data-lucide="chevron-up" class="w-4 h-4 ml-1"></i>';
                } else {
                    this.innerHTML = '高级筛选 <i data-lucide="chevron-down" class="w-4 h-4 ml-1"></i>';
                }
                
                // 重新初始化图标
                lucide.createIcons();
            });
            
            // 抽屉功能
            const sourceSystemDrawer = document.getElementById('source-system-drawer');
            const addBtn = document.getElementById('add-btn');
            const closeSourceSystemDrawer = document.getElementById('close-source-system-drawer');
            const cancelSourceSystemBtn = document.getElementById('cancel-source-system-btn');
            const saveSourceSystemBtn = document.getElementById('save-source-system-btn');
            const sourceSystemDrawerTitle = document.getElementById('source-system-drawer-title');
            
            addBtn.addEventListener('click', () => {
                sourceSystemDrawerTitle.textContent = '新增来源系统';
                document.getElementById('source-system-code').value = '';
                document.getElementById('source-system-name').value = '';
                document.getElementById('source-system-description').value = '';
                document.getElementById('source-system-status').checked = true;
                if (typeof openDrawer === 'function') {
                    openDrawer(sourceSystemDrawer);
                } else {
                    sourceSystemDrawer.classList.add('open');
                    document.getElementById('drawer-overlay').classList.add('open');
                }
            });
            
            window.editSourceSystem = function(code) {
                sourceSystemDrawerTitle.textContent = '编辑来源系统';
                
                // 模拟数据填充
                if (code === 'SYS001') {
                    document.getElementById('source-system-code').value = 'SYS001';
                    document.getElementById('source-system-name').value = 'SVI';
                    document.getElementById('source-system-description').value = '销售系统';
                    document.getElementById('source-system-status').checked = true;
                } else if (code === 'SYS002') {
                    document.getElementById('source-system-code').value = 'SYS002';
                    document.getElementById('source-system-name').value = '积木云装';
                    document.getElementById('source-system-description').value = '装修管理系统';
                    document.getElementById('source-system-status').checked = true;
                } else if (code === 'SYS003') {
                    document.getElementById('source-system-code').value = 'SYS003';
                    document.getElementById('source-system-name').value = 'WMS';
                    document.getElementById('source-system-description').value = '仓库管理系统';
                    document.getElementById('source-system-status').checked = false;
                }
                
                if (typeof openDrawer === 'function') {
                    openDrawer(sourceSystemDrawer);
                } else {
                    sourceSystemDrawer.classList.add('open');
                    document.getElementById('drawer-overlay').classList.add('open');
                }
            };
            
            closeSourceSystemDrawer.addEventListener('click', () => {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(sourceSystemDrawer);
                } else {
                    sourceSystemDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            });
            
            cancelSourceSystemBtn.addEventListener('click', () => {
                if (typeof closeDrawer === 'function') {
                    closeDrawer(sourceSystemDrawer);
                } else {
                    sourceSystemDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            });
            
            saveSourceSystemBtn.addEventListener('click', () => {
                alert('保存成功');
                if (typeof closeDrawer === 'function') {
                    closeDrawer(sourceSystemDrawer);
                } else {
                    sourceSystemDrawer.classList.remove('open');
                    document.getElementById('drawer-overlay').classList.remove('open');
                }
            });
        }
        
        // 初始化Lucide图标
        lucide.createIcons();
        
        // 加载侧边栏
        loadSidebar();
    </script>
</body>
</html>
