<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBS映射配置 - 财务中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003eb3',
                        secondary: '#e6f0ff',
                        accent: '#ff6b6b',
                        neutral: '#f5f7fa',
                    },
                    borderRadius: { 'sm': '4px', 'md': '8px', 'lg': '12px', 'xl': '16px' },
                },
            }
        }
    </script>
    <link rel="stylesheet" href="common/styles.css">
</head>
<body class="bg-neutral">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <main class="flex-1 ml-64 p-6 transition-all duration-300 overflow-y-auto" id="main-content">
            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h1 class="text-xl font-semibold text-gray-800">EBS映射配置</h1>
                    <p class="text-sm text-gray-500 mt-1">维护中台主数据与 EBS 系统之间的映射关系（财务主体映射、内部往来映射）。</p>
                </div>

                <div class="bg-white rounded-lg shadow-sm p-6">
                    <!-- 子Tab：财务主体映射 / 内部往来映射 -->
                    <div class="border-b border-gray-200 mb-4">
                        <nav class="flex space-x-8">
                            <button id="subtab-entity-mapping" class="py-3 px-1 border-b-2 border-primary text-primary font-medium">财务主体映射</button>
                            <button id="subtab-internal-mapping" class="py-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700">内部往来映射</button>
                        </nav>
                    </div>

                    <!-- 财务主体映射 -->
                    <div id="content-entity-mapping" class="subtab-content">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-medium text-gray-800">财务主体映射</h2>
                            <div class="flex items-center space-x-3">
                                <button class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 text-sm">取消</button>
                                <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 text-sm">保存</button>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 mb-3">校验：同一个中台财务主体只能存在一行映射关系，不可重复。</p>
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">中台财务主体</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">EBS公司编码</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">EBS公司id</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">操作人</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">操作时间</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-200" id="entity-mapping-tbody">
                                    <tr>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white">
                                                <input type="text" placeholder="模糊搜索/弹框选择" class="flex-1 text-sm outline-none" value="财务主体1">
                                                <i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
                                            </div>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white">
                                                <input type="text" placeholder="弹框选择" class="flex-1 text-sm outline-none" value="EBS001">
                                                <i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
                                            </div>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-500">
                                         <input type="text" class="w-full px-2 py-1 border border-gray-200 rounded-md text-sm bg-gray-100" value="100001" readonly>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-700">张三</td>
                                        <td class="px-4 py-2 text-sm text-gray-700">2026-04-15 10:32</td>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <button class="text-red-600 hover:text-red-800 row-delete-btn">删除行</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white">
                                                <input type="text" placeholder="模糊搜索/弹框选择" class="flex-1 text-sm outline-none" value="财务主体2">
                                                <i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
                                            </div>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white">
                                                <input type="text" placeholder="弹框选择" class="flex-1 text-sm outline-none" value="EBS002">
                                                <i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
                                            </div>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-500">
                                            <input type="text" class="w-full px-2 py-1 border border-gray-200 rounded-md text-sm bg-gray-100" value="100002" readonly>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-700">李四</td>
                                        <td class="px-4 py-2 text-sm text-gray-700">2026-04-16 09:15</td>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <button class="text-red-600 hover:text-red-800 row-delete-btn">删除行</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <button id="add-entity-row" class="mt-3 flex items-center px-3 py-1.5 border border-dashed border-gray-300 rounded-md text-sm text-gray-600 hover:bg-gray-50">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i>新增行
                        </button>
                    </div>

                    <!-- 内部往来映射 -->
                    <div id="content-internal-mapping" class="subtab-content hidden">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-medium text-gray-800">内部往来映射</h2>
                            <div class="flex items-center space-x-3">
                                <button class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 text-sm">取消</button>
                                <button class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700 text-sm">保存</button>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 mb-3">校验：同一个中台内部客商只能存在一行映射关系，不可重复。</p>
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">中台内部客商</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">EBS内往编码</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">EBS内往id</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">操作人</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">操作时间</th>
                                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-200" id="internal-mapping-tbody">
                                    <tr>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white">
                                                <input type="text" placeholder="模糊搜索（内部客商=是）" class="flex-1 text-sm outline-none" value="内部客商A">
                                                <i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
                                            </div>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-700">
                                            <div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white">
                                                <input type="text" placeholder="弹框选择" class="flex-1 text-sm outline-none" value="NW001">
                                                <i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
                                            </div>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-500">
                                            <input type="text" class="w-full px-2 py-1 border border-gray-200 rounded-md text-sm bg-gray-100" value="200001" readonly>
                                        </td>
                                        <td class="px-4 py-2 text-sm text-gray-700">王五</td>
                                        <td class="px-4 py-2 text-sm text-gray-700">2026-04-18 14:22</td>
                                     <td class="px-4 py-2 text-sm text-gray-700">
                                            <button class="text-red-600 hover:text-red-800 row-delete-btn">删除行</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <button id="add-internal-row" class="mt-3 flex items-center px-3 py-1.5 border border-dashed border-gray-300 rounded-md text-sm text-gray-600 hover:bg-gray-50">
                            <i data-lucide="plus" class="w-4 h-4 mr-1"></i>新增行
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadSidebar() {
            try {
                const response = await fetch('common/sidebar.html');
                const sidebarHtml = await response.text();
                document.getElementById('sidebar-container').innerHTML = sidebarHtml;
                const script = document.createElement('script');
                script.src = 'common/scripts.js';
                script.onload = function() { if (typeof initCommonFunctions === 'function') initCommonFunctions(); };
                document.body.appendChild(script);
            } catch (error) { console.error('加载侧边栏失败:', error); }
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', loadSidebar);
        else loadSidebar();

        // 子Tab切换
        const subTabs = { 'entity-mapping': 'content-entity-mapping', 'internal-mapping': 'content-internal-mapping' };
        Object.keys(subTabs).forEach(id => {
            document.getElementById(`subtab-${id}`)?.addEventListener('click', function() {
                Object.keys(subTabs).forEach(k => {
                    const btn = document.getElementById(`subtab-${k}`);
                    const ct = document.getElementById(subTabs[k]);
                    if (k === id) {
                        btn.classList.add('border-primary', 'text-primary', 'font-medium');
                        btn.classList.remove('border-transparent', 'text-gray-500');
                        ct.classList.remove('hidden');
                    } else {
                        btn.classList.remove('border-primary', 'text-primary', 'font-medium');
                        btn.classList.add('border-transparent', 'text-gray-500');
                        ct.classList.add('hidden');
                    }
                });
            });
        });

        function buildEntityRow() {
            return `<tr>
                <td class="px-4 py-2 text-sm text-gray-700"><div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white"><input type="text" placeholder="模糊搜索/弹框选择" class="flex-1 text-sm outline-none"><i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i></div></td>
                <td class="px-4 py-2 text-sm text-gray-700"><div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white"><input type="text" placeholder="弹框选择" class="flex-1 text-sm outline-none"><i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i></div></td>
                <td class="px-4 py-2 text-sm text-gray-500"><input type="text" class="w-full px-2 py-1 border border-gray-200 rounded-md text-sm bg-gray-100" readonly></td>
                <td class="px-4 py-2 text-sm text-gray-700">-</td>
                <td class="px-4 py-2 text-sm text-gray-700">-</td>
                <td class="px-4 py-2 text-sm text-gray-700"><button class="text-red-600 hover:text-red-800 row-delete-btn">删除行</button></td>
            </tr>`;
        }
        function buildInternalRow() {
            return `<tr>
                <td class="px-4 py-2 text-sm text-gray-700"><div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white"><input type="text" placeholder="模糊搜索（内部客商=是）" class="flex-1 text-sm outline-none"><i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i></div></td>
                <td class="px-4 py-2 text-sm text-gray-700"><div class="flex items-center border border-gray-300 rounded-md px-2 py-1 bg-white"><input type="text" placeholder="弹框选择" class="flex-1 text-sm outline-none"><i data-lucide="search" class="w-4 h-4 text-gray-400 cursor-pointer"></i></div></td>
                <td class="px-4 py-2 text-sm text-gray-500"><input type="text" class="w-full px-2 py-1 border border-gray-200 rounded-md text-sm bg-gray-100" readonly></td>
                <td class="px-4 py-2 text-sm text-gray-700">-</td>
                <td class="px-4 py-2 text-sm text-gray-700">-</td>
                <td class="px-4 py-2 text-sm text-gray-700"><button class="text-red-600 hover:text-red-800 row-delete-btn">删除行</button></td>
            </tr>`;
        }
        document.getElementById('add-entity-row')?.addEventListener('click', function() {
            document.getElementById('entity-mapping-tbody').insertAdjacentHTML('beforeend', buildEntityRow());
            if (window.lucide) lucide.createIcons();
        });
        document.getElementById('add-internal-row')?.addEventListener('click', function() {
            document.getElementById('internal-mapping-tbody').insertAdjacentHTML('beforeend', buildInternalRow());
            if (window.lucide) lucide.createIcons();
        });
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('row-delete-btn')) {
                if (confirm('确认删除该行？')) e.target.closest('tr').remove();
            }
        });
    </script>

    <!-- PRD Viewer -->
    <link rel="stylesheet" href="common/prd-viewer.css">
    <script src="common/prd-viewer.js" defer></script>
</body>
</html>
